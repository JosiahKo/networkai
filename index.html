<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TrueLabel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --surface2:#1a1a1a;
  --border:#222;
  --border2:#2e2e2e;
  --text:#f0f0f0;
  --text2:#888;
  --text3:#555;
  --green:#00d084;
  --green-bg:#001a0f;
  --amber:#f5a623;
  --amber-bg:#1a1000;
  --red:#ff4444;
  --red-bg:#1a0000;
  --blue:#4da6ff;
}
html,body{background:var(--bg);min-height:100vh;}
body{font-family:'Space Grotesk',sans-serif;color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.shell{max-width:540px;margin:0 auto;padding:0 20px 80px;min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:36px;flex-shrink:0;}
.wordmark{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:0.02em;color:var(--text);}
.wordmark span{color:var(--green);}
.tagline{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}

/* Scanner area */
.scan-wrap{flex:1;display:flex;flex-direction:column;align-items:center;}
.scan-hero{text-align:center;margin-bottom:36px;width:100%;}
.scan-title{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px;}
.scan-hint{font-size:14px;color:var(--text2);line-height:1.6;}

/* Camera viewfinder */
.viewfinder-wrap{
  width:100%;max-width:360px;margin:0 auto 28px;
  position:relative;background:#000;
  border:1px solid var(--border2);overflow:hidden;
  border-radius:4px;
}
.viewfinder-wrap video{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;}
.viewfinder-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.scan-line{
  position:absolute;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);
  animation:scanline 2s ease-in-out infinite;
  box-shadow:0 0 8px var(--green);
}
@keyframes scanline{0%{top:20%;}50%{top:75%;}100%{top:20%;}}
.corner{position:absolute;width:20px;height:20px;}
.corner-tl{top:8px;left:8px;border-top:2px solid var(--green);border-left:2px solid var(--green);}
.corner-tr{top:8px;right:8px;border-top:2px solid var(--green);border-right:2px solid var(--green);}
.corner-bl{bottom:8px;left:8px;border-bottom:2px solid var(--green);border-left:2px solid var(--green);}
.corner-br{bottom:8px;right:8px;border-bottom:2px solid var(--green);border-right:2px solid var(--green);}
.scan-status{
  position:absolute;bottom:10px;left:0;right:0;text-align:center;
  font-family:'Space Mono',monospace;font-size:10px;color:var(--green);
  letter-spacing:0.1em;text-transform:uppercase;
}

/* Buttons */
.btn-primary{
  width:100%;max-width:360px;padding:14px;
  background:var(--green);color:#000;border:none;
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;
  transition:opacity 0.15s;border-radius:3px;
}
.btn-primary:hover{opacity:0.88;}
.btn-primary:disabled{opacity:0.3;cursor:not-allowed;}
.btn-secondary{
  width:100%;max-width:360px;padding:12px;margin-top:10px;
  background:transparent;color:var(--text2);
  border:1px solid var(--border2);
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;border-radius:3px;
}
.btn-secondary:hover{border-color:var(--text3);color:var(--text);}

/* Manual input */
.manual-wrap{width:100%;max-width:360px;margin:20px auto 0;text-align:center;}
.manual-label{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.manual-row{display:flex;gap:8px;}
.manual-input{
  flex:1;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);font-family:'Space Mono',monospace;font-size:14px;
  padding:10px 12px;outline:none;transition:border-color 0.2s;border-radius:3px;
}
.manual-input::placeholder{color:var(--text3);}
.manual-input:focus{border-color:var(--green);}
.manual-btn{
  padding:10px 16px;background:var(--surface2);color:var(--text);
  border:1px solid var(--border2);font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;border-radius:3px;
}
.manual-btn:hover{border-color:var(--green);color:var(--green);}

/* Loading */
.load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0;}
.load-ring{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
.load-sub{font-size:12px;color:var(--text2);font-family:'Space Mono',monospace;}

/* Results */
.results-wrap{flex:1;width:100%;}

.product-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.product-img{width:64px;height:64px;object-fit:contain;background:var(--surface);border:1px solid var(--border2);border-radius:4px;flex-shrink:0;}
.product-img-placeholder{width:64px;height:64px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
.product-name{font-size:18px;font-weight:700;margin-bottom:2px;letter-spacing:-0.01em;}
.product-brand{font-size:13px;color:var(--text2);}

/* Verdict banner */
.verdict-banner{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:4px;margin-bottom:20px;
}
.verdict-banner.clean{background:var(--green-bg);border:1px solid #00401a;}
.verdict-banner.caution{background:var(--amber-bg);border:1px solid #3a2800;}
.verdict-banner.warning{background:var(--red-bg);border:1px solid #400000;}
.verdict-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.verdict-banner.clean .verdict-dot{background:var(--green);}
.verdict-banner.caution .verdict-dot{background:var(--amber);}
.verdict-banner.warning .verdict-dot{background:var(--red);}
.verdict-text{font-size:14px;font-weight:600;}
.verdict-banner.clean .verdict-text{color:var(--green);}
.verdict-banner.caution .verdict-text{color:var(--amber);}
.verdict-banner.warning .verdict-text{color:var(--red);}

/* Key facts row */
.facts-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.fact-pill{
  padding:5px 12px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:20px;
  font-size:12px;font-family:'Space Mono',monospace;color:var(--text2);
}
.fact-pill strong{color:var(--text);font-weight:700;}

/* Section cards */
.section-card{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:16px 18px;margin-bottom:10px;}
.section-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.section-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.section-status.clean{background:var(--green);}
.section-status.caution{background:var(--amber);}
.section-status.warning{background:var(--red);}
.section-title{font-size:12px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text2);}
.section-body{font-size:13px;color:var(--text);line-height:1.7;}
.section-source{margin-top:8px;}
.section-source a{font-size:11px;color:var(--blue);text-decoration:none;letter-spacing:0.03em;}
.section-source a:hover{text-decoration:underline;}

/* Bottom line */
.bottom-line{margin-top:20px;padding:18px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;}
.bottom-line-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.bottom-line-text{font-size:14px;color:var(--text);line-height:1.75;}

.scan-again-btn{
  margin-top:24px;width:100%;padding:12px;
  background:transparent;color:var(--text2);
  border:1px solid var(--border2);
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;
  transition:all 0.15s;border-radius:3px;
}
.scan-again-btn:hover{border-color:var(--green);color:var(--green);}

/* Error */
.err-box{background:var(--red-bg);border:1px solid #400000;border-radius:4px;padding:16px;font-size:13px;color:#ff8888;line-height:1.7;margin-top:20px;}

@media(max-width:400px){.scan-title{font-size:24px;}}
</style>
</head>
<body>
<div id="root"></div>

<!-- ZXing barcode scanner library -->
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // ── CLOUDFLARE WORKER URL ────────────────────────────────────
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
  // ────────────────────────────────────────────────────────────
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const LOAD_MSGS = [
  "Looking up product...",
  "Checking FDA recall database...",
  "Searching for lawsuits...",
  "Analyzing ingredients...",
  "Writing your report...",
];

const STATUS_COLORS = { clean: "#00d084", caution: "#f5a623", warning: "#ff4444" };

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("{"), e = t.lastIndexOf("}");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s,e+1)); } catch(_) {} }
  return null;
}

function ScanScreen({ onBarcode }) {
  const videoRef = useRef(null);
  const [scanning, setScanning] = useState(false);
  const [cameraError, setCameraError] = useState(false);
  const [manualCode, setManualCode] = useState("");
  const readerRef = useRef(null);

  async function startScanner() {
    if (!window.ZXing) { setCameraError(true); return; }
    try {
      const hints = new Map();
      const formats = [
        window.ZXing.BarcodeFormat.EAN_13,
        window.ZXing.BarcodeFormat.EAN_8,
        window.ZXing.BarcodeFormat.UPC_A,
        window.ZXing.BarcodeFormat.UPC_E,
        window.ZXing.BarcodeFormat.CODE_128,
      ];
      hints.set(window.ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
      const reader = new window.ZXing.BrowserMultiFormatReader(hints);
      readerRef.current = reader;
      setScanning(true);
      const devices = await window.ZXing.BrowserCodeReader.listVideoInputDevices();
      const deviceId = devices.length > 1 ? devices[devices.length - 1].deviceId : undefined;
      reader.decodeFromVideoDevice(deviceId, videoRef.current, (result, err) => {
        if (result) {
          reader.reset();
          setScanning(false);
          onBarcode(result.getText());
        }
      });
    } catch(e) {
      setCameraError(true);
      setScanning(false);
    }
  }

  useEffect(() => {
    return () => { if (readerRef.current) readerRef.current.reset(); };
  }, []);

  function stopScanner() {
    if (readerRef.current) readerRef.current.reset();
    setScanning(false);
  }

  function submitManual() {
    const code = manualCode.trim();
    if (code.length >= 8) onBarcode(code);
  }

  return (
    <div className="scan-wrap">
      <div className="scan-hero">
        <div className="scan-title">What's really in it?</div>
        <div className="scan-hint">Scan any food barcode for recalls, lawsuits, ingredient concerns, and the honest story behind the label.</div>
      </div>

      {scanning ? (
        <>
          <div className="viewfinder-wrap">
            <video ref={videoRef} muted playsInline />
            <canvas />
            <div className="scan-line" />
            <div className="corner corner-tl" />
            <div className="corner corner-tr" />
            <div className="corner corner-bl" />
            <div className="corner corner-br" />
            <div className="scan-status">Scanning...</div>
          </div>
          <button className="btn-secondary" style={{maxWidth:360,margin:"0 auto"}} onClick={stopScanner}>Cancel</button>
        </>
      ) : (
        <>
          <button className="btn-primary" onClick={startScanner} disabled={cameraError}>
            {cameraError ? "Camera unavailable" : "Scan barcode"}
          </button>

          <div className="manual-wrap">
            <div className="manual-label">Or enter barcode manually</div>
            <div className="manual-row">
              <input
                className="manual-input"
                placeholder="e.g. 016000275287"
                value={manualCode}
                onChange={e => setManualCode(e.target.value.replace(/\D/g,""))}
                onKeyDown={e => e.key === "Enter" && submitManual()}
                maxLength={14}
                inputMode="numeric"
              />
              <button className="manual-btn" onClick={submitManual} disabled={manualCode.length < 8}>Go</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function LoadingScreen({ msg }) {
  return (
    <div className="load-wrap">
      <div className="load-ring" />
      <div className="load-msg">{msg}</div>
      <div className="load-sub">Checking public records</div>
    </div>
  );
}

function ResultsScreen({ report, product, onReset }) {
  if (!report) return null;
  const verdict = report.overallVerdict || "caution";

  return (
    <div className="results-wrap">
      <div className="product-header">
        {product.imageUrl
          ? <img className="product-img" src={product.imageUrl} alt={product.name} onError={e => e.target.style.display="none"} />
          : <div className="product-img-placeholder">🏷</div>
        }
        <div>
          <div className="product-name">{product.name}</div>
          <div className="product-brand">{product.brand}</div>
        </div>
      </div>

      <div className={"verdict-banner " + verdict}>
        <div className="verdict-dot" />
        <div className="verdict-text">{report.verdictReason || verdict.toUpperCase()}</div>
      </div>

      {report.keyFacts && report.keyFacts.length > 0 && (
        <div className="facts-row">
          {report.keyFacts.map((f,i) => (
            <div key={i} className="fact-pill"><strong>{f.label}:</strong> {f.value}</div>
          ))}
        </div>
      )}

      {report.sections && report.sections.map((s,i) => (
        <div key={i} className="section-card">
          <div className="section-top">
            <div className={"section-status " + (s.status||"clean")} />
            <div className="section-title">{s.title}</div>
          </div>
          <div className="section-body">{s.summary}</div>
          {s.sourceUrl && s.sourceUrl !== "null" && (
            <div className="section-source">
              <a href={s.sourceUrl} target="_blank" rel="noopener noreferrer">
                Source: {s.sourceLabel || s.sourceUrl} ↗
              </a>
            </div>
          )}
        </div>
      ))}

      {report.bottomLine && (
        <div className="bottom-line">
          <div className="bottom-line-label">Bottom line</div>
          <div className="bottom-line-text">{report.bottomLine}</div>
        </div>
      )}

      <button className="scan-again-btn" onClick={onReset}>← Scan another product</button>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("scan");
  const [loadMsg, setLoadMsg] = useState(LOAD_MSGS[0]);
  const [report, setReport] = useState(null);
  const [product, setProduct] = useState(null);
  const [error, setError] = useState("");
  const loadTimerRef = useRef(null);

  async function handleBarcode(barcode) {
    setError("");
    setScreen("loading");
    setLoadMsg(LOAD_MSGS[0]);

    let idx = 0;
    loadTimerRef.current = setInterval(() => {
      idx = (idx + 1) % LOAD_MSGS.length;
      setLoadMsg(LOAD_MSGS[idx]);
    }, 3000);

    try {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ barcode })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const parsed = extractJSON(data.jsonText || "");
      if (!parsed) throw new Error("Could not parse report. Try again.");

      setReport(parsed);
      setProduct(data.product || { name: "Unknown product", brand: "", imageUrl: null });
      setScreen("results");
    } catch(e) {
      setError(e.message);
      setScreen("error");
    } finally {
      clearInterval(loadTimerRef.current);
    }
  }

  function reset() { setScreen("scan"); setReport(null); setProduct(null); setError(""); }

  return (
    <div className="shell">
      <div className="top-bar">
        <div className="wordmark">True<span>Label</span></div>
        <div className="tagline">Honest food intel</div>
      </div>

      {screen === "scan" && <ScanScreen onBarcode={handleBarcode} />}
      {screen === "loading" && <LoadingScreen msg={loadMsg} />}
      {screen === "results" && <ResultsScreen report={report} product={product} onReset={reset} />}
      {screen === "error" && (
        <div style={{flex:1}}>
          <div className="err-box">{error}</div>
          <button className="scan-again-btn" style={{marginTop:20}} onClick={reset}>← Try again</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
