<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dead Mentors</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --parchment:#f7f2e8;
  --parchment2:#f0e9d6;
  --parchment3:#e8dfc8;
  --ink:#1c1208;
  --ink2:#5c4a2a;
  --ink3:#8b7355;
  --ink4:#b8a888;
  --rust:#8b3a1a;
  --rust2:#a84820;
  --sepia:#c8a96e;
  --border:#d4c4a0;
  --border2:#c0ae88;
}
html{background:var(--parchment);}
body{
  font-family:'EB Garamond',Georgia,serif;
  background:var(--parchment);
  color:var(--ink);
  min-height:100vh;
  font-size:17px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

/* Subtle paper texture via gradient */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(180,160,100,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(200,180,120,0.06) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

.shell{
  max-width:660px;margin:0 auto;
  padding:0 32px 80px;
  min-height:100vh;
  display:flex;flex-direction:column;
  position:relative;z-index:1;
}

/* Header */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:36px 0 32px;
  border-bottom:1px solid var(--border);
  margin-bottom:52px;flex-shrink:0;
}
.wordmark{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:300;
  letter-spacing:0.08em;
  color:var(--ink2);
  text-transform:uppercase;
  font-style:italic;
}
.wordmark em{color:var(--rust);font-style:italic;}
.progress-track{display:flex;gap:6px;}
.ptick{width:24px;height:1px;background:var(--border2);transition:background 0.4s;}
.ptick.done{background:var(--ink3);}
.ptick.active{background:var(--rust);}

/* Steps */
.step-wrap{flex:1;display:flex;flex-direction:column;min-height:460px;animation:emerge 0.4s ease both;}
@keyframes emerge{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.step-tag{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--rust);margin-bottom:22px;font-family:'EB Garamond',serif;}
.step-q{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:300;font-style:italic;
  color:var(--ink);margin-bottom:12px;
  line-height:1.2;letter-spacing:-0.01em;
}
.step-hint{font-size:15px;color:var(--ink2);margin-bottom:38px;line-height:1.75;font-style:italic;}

/* Inputs */
.input-line{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--border2);
  color:var(--ink);font-family:'EB Garamond',serif;
  font-size:19px;padding:10px 0;outline:none;
  transition:border-color 0.2s;
}
.input-line::placeholder{color:var(--ink4);}
.input-line:focus{border-bottom-color:var(--rust);}

.textarea-field{
  width:100%;background:var(--parchment2);
  border:1px solid var(--border);
  color:var(--ink);font-family:'EB Garamond',serif;
  font-size:17px;line-height:1.75;
  padding:16px 18px;outline:none;resize:none;
  transition:border-color 0.2s;min-height:100px;
}
.textarea-field::placeholder{color:var(--ink4);font-style:italic;}
.textarea-field:focus{border-color:var(--rust);}

/* Chips */
.chip-set{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.chip{
  padding:7px 18px;border:1px solid var(--border2);
  background:transparent;color:var(--ink2);
  font-family:'EB Garamond',serif;font-size:15px;
  cursor:pointer;transition:all 0.15s;
  font-style:italic;
}
.chip:hover{border-color:var(--rust);color:var(--rust);}
.chip.on{border-color:var(--rust);color:var(--parchment);background:var(--rust);}

/* Nav */
.nav{display:flex;align-items:center;gap:12px;margin-top:auto;padding-top:44px;}
.btn-go{
  padding:11px 28px;background:var(--ink);color:var(--parchment);
  border:none;font-family:'EB Garamond',serif;
  font-size:15px;letter-spacing:0.06em;
  cursor:pointer;transition:background 0.2s;
  font-style:italic;
}
.btn-go:hover{background:var(--rust);}
.btn-back{
  padding:11px 18px;background:transparent;color:var(--ink3);
  border:1px solid var(--border2);
  font-family:'EB Garamond',serif;font-size:15px;
  cursor:pointer;transition:all 0.15s;
}
.btn-back:hover{color:var(--ink);border-color:var(--ink3);}
.btn-skip{
  margin-left:auto;background:none;border:none;
  color:var(--ink4);font-family:'EB Garamond',serif;
  font-size:14px;cursor:pointer;font-style:italic;
}
.btn-skip:hover{color:var(--ink3);}

/* Loading */
.load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:460px;text-align:center;}
.load-hourglass{font-size:28px;margin-bottom:24px;animation:flicker 3s ease-in-out infinite;}
@keyframes flicker{0%,100%{opacity:1;}50%{opacity:0.4;}}
.load-msg{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--ink2);margin-bottom:8px;}
.load-sub{font-size:13px;color:var(--ink3);letter-spacing:0.05em;}

/* Results */
.results-wrap{flex:1;padding-top:4px;}
.results-head{margin-bottom:8px;}
.results-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-style:italic;font-weight:300;letter-spacing:-0.01em;color:var(--ink);}
.results-sub{font-size:13px;color:var(--ink3);margin-top:6px;letter-spacing:0.06em;text-transform:uppercase;}
.results-note{
  font-size:14px;color:var(--ink2);line-height:1.75;
  padding:14px 18px;background:var(--parchment2);
  border-left:2px solid var(--rust);
  margin:20px 0 36px;font-style:italic;
}

/* Mentor card */
.mentor-card{border-top:1px solid var(--border);padding:34px 0;}
.mentor-card:last-of-type{border-bottom:1px solid var(--border);}
.mentor-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.mentor-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:-0.01em;}
.mentor-years{font-size:13px;color:var(--ink3);font-style:italic;margin-top:2px;}
.mentor-source{
  font-size:12px;color:var(--rust);
  letter-spacing:0.05em;text-transform:uppercase;
  margin-top:2px;
}

.mentor-context{
  font-size:14px;color:var(--ink2);line-height:1.7;
  margin:16px 0;font-style:italic;
  padding-left:16px;border-left:1px solid var(--border2);
}

/* The actual passage — the centrepiece */
.passage-wrap{
  background:var(--parchment2);
  border:1px solid var(--border);
  padding:24px 26px;
  margin:18px 0;
  position:relative;
}
.passage-wrap::before{
  content:'\201C';
  font-family:'Cormorant Garamond',serif;
  font-size:80px;color:var(--sepia);
  position:absolute;top:-10px;left:12px;
  line-height:1;opacity:0.6;
}
.passage-text{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-style:italic;
  line-height:1.65;color:var(--ink);
  padding-left:24px;
}
.passage-attr{
  font-size:13px;color:var(--ink3);
  margin-top:12px;padding-left:24px;
  letter-spacing:0.03em;
}

.resonance-text{font-size:15px;color:var(--ink2);line-height:1.75;margin:14px 0;}

.mentor-footer{display:flex;align-items:center;gap:16px;margin-top:14px;}
.source-link{
  font-size:12px;color:var(--rust);
  border-bottom:1px solid var(--border2);
  text-decoration:none;padding-bottom:1px;
  letter-spacing:0.05em;text-transform:uppercase;
  transition:all 0.15s;
}
.source-link:hover{border-color:var(--rust);}

.restart-btn{
  margin-top:40px;background:none;border:none;
  font-family:'EB Garamond',serif;font-size:14px;
  color:var(--ink3);cursor:pointer;
  font-style:italic;letter-spacing:0.03em;
}
.restart-btn:hover{color:var(--ink2);}

/* Summary */
.sum-line{font-size:16px;color:var(--ink2);margin-bottom:10px;line-height:1.8;font-style:italic;}
.sum-line strong{color:var(--ink);font-weight:500;font-style:normal;}

/* Error */
.err-box{
  background:var(--parchment2);border:1px solid #c4a08a;
  padding:18px 20px;font-size:14px;color:var(--rust);
  line-height:1.7;margin-top:20px;font-style:italic;
}
.err-raw{margin-top:8px;font-size:11px;color:var(--ink4);font-family:monospace;font-style:normal;word-break:break-all;max-height:80px;overflow-y:auto;}

.divider{
  text-align:center;color:var(--border2);
  font-family:'Cormorant Garamond',serif;
  font-size:18px;letter-spacing:0.3em;
  margin:8px 0;
}

@media(max-width:500px){.step-q{font-size:28px;}.passage-text{font-size:17px;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // ── CLOUDFLARE WORKER URL ────────────────────────────────────
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
  // ────────────────────────────────────────────────────────────
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TOTAL_STEPS = 3;

const EMOTIONS = [
  "Anxious", "Stuck", "Lost", "Overwhelmed",
  "Like a fraud", "Afraid to fail", "Directionless",
  "Burnt out", "Lonely", "Restless",
];

const COUNTS = ["3", "5"];

const LOAD_MSGS = [
  "Searching the archives...",
  "Reading letters never meant for us...",
  "Finding the right voices...",
  "Crossing centuries...",
  "Almost there...",
];

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s,e+1)); } catch(_) {} }
  return null;
}

function ProgressTrack({ current, total }) {
  return (
    <div className="progress-track">
      {Array.from({length:total}).map((_,i) => (
        <div key={i} className={"ptick"+(i<current?" done":"")+(i===current?" active":"")} />
      ))}
    </div>
  );
}

function MentorCard({ mentor, idx }) {
  return (
    <div className="mentor-card">
      <div className="mentor-top">
        <div>
          <div className="mentor-name">{mentor.name}</div>
          {mentor.years && <div className="mentor-years">{mentor.years}</div>}
        </div>
      </div>
      {mentor.sourceTitle && (
        <div className="mentor-source">
          {mentor.sourceTitle}{mentor.sourceDate ? " · " + mentor.sourceDate : ""}
        </div>
      )}

      {mentor.context && <div className="mentor-context">{mentor.context}</div>}

      {mentor.passage && (
        <div className="passage-wrap">
          <div className="passage-text">{mentor.passage}</div>
          {mentor.name && (
            <div className="passage-attr">— {mentor.name}{mentor.sourceDate ? ", " + mentor.sourceDate : ""}</div>
          )}
        </div>
      )}

      {mentor.resonance && <div className="resonance-text">{mentor.resonance}</div>}

      <div className="mentor-footer">
        {mentor.sourceUrl && mentor.sourceUrl !== "null" && (
          <a className="source-link" href={mentor.sourceUrl} target="_blank" rel="noopener noreferrer">
            Read original source ↗
          </a>
        )}
        {mentor.sourceLabel && !mentor.sourceUrl && (
          <span style={{fontSize:12,color:"var(--ink3)",letterSpacing:"0.04em",textTransform:"uppercase"}}>{mentor.sourceLabel}</span>
        )}
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [problem, setProblem] = useState("");
  const [emotion, setEmotion] = useState("Anxious");
  const [count, setCount] = useState("3");

  const [loading, setLoading] = useState(false);
  const [loadIdx, setLoadIdx] = useState(0);
  const [results, setResults] = useState(null);
  const [error, setError] = useState("");
  const [rawDebug, setRawDebug] = useState("");
  const timerRef = useRef(null);

  useEffect(() => {
    if (loading) {
      setLoadIdx(0);
      timerRef.current = setInterval(() => setLoadIdx(i => (i+1) % LOAD_MSGS.length), 3000);
    } else { clearInterval(timerRef.current); }
    return () => clearInterval(timerRef.current);
  }, [loading]);

  async function runSearch() {
    setError(""); setRawDebug(""); setResults(null); setLoading(true);
    try {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ problem, emotion, count })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setRawDebug(data.debug || "");
      const parsed = extractJSON(data.jsonText || "");
      if (!parsed || !Array.isArray(parsed) || parsed.length === 0) {
        throw new Error("No historical parallels found. Try describing your situation differently.\n\n" + (data.jsonText||"").slice(0,200));
      }
      setResults(parsed);
      setStep(5);
    } catch(e) {
      setError(e.message);
      setStep(6);
    } finally { setLoading(false); }
  }

  const next = () => setStep(s => s+1);
  const back = () => setStep(s => s-1);
  function restart() { setStep(0); setResults(null); setError(""); setRawDebug(""); }

  if (loading) return (
    <div className="shell">
      <div className="top-bar"><div className="wordmark">Dead <em>Mentors</em></div></div>
      <div className="load-wrap">
        <div className="load-hourglass">⧗</div>
        <div className="load-msg">{LOAD_MSGS[loadIdx]}</div>
        <div className="load-sub">Searching centuries of letters and diaries</div>
      </div>
    </div>
  );

  function renderContent() {
    if (step === 5 && results) return (
      <div className="results-wrap">
        <div className="results-head">
          <div className="results-title">They've been here too.</div>
          <div className="results-sub">{results.length} voices across history · {emotion.toLowerCase()}</div>
        </div>
        <div className="results-note">
          These are not motivational quotes. They are the actual words — letters, diary entries, speeches — of people who sat with what you are sitting with now. Read slowly.
        </div>
        <div className="divider">· · ·</div>
        {results.map((m,i) => <MentorCard key={i} mentor={m} idx={i} />)}
        <button className="restart-btn" onClick={restart}>← Ask again</button>
      </div>
    );

    if (step === 6) return (
      <div className="step-wrap">
        <div className="step-tag">Something went wrong</div>
        <div className="step-q">The archives were quiet.</div>
        <div className="err-box">
          {error}
          {rawDebug && <div className="err-raw">{rawDebug}</div>}
        </div>
        <div className="nav">
          <button className="btn-go" onClick={()=>{ setError(""); setStep(2); }}>Try again</button>
          <button className="btn-skip" onClick={restart}>Start over</button>
        </div>
      </div>
    );

    switch(step) {
      case 0: return (
        <div className="step-wrap">
          <div className="step-tag">I</div>
          <div className="step-q">What's weighing on you?</div>
          <div className="step-hint">Describe it plainly. The more specific you are, the more precisely we can search the historical record.</div>
          <textarea
            className="textarea-field"
            placeholder="e.g. I feel like everyone around me knows what they're doing and I don't. I'm halfway through college and still have no idea what I actually want."
            value={problem}
            onChange={e => setProblem(e.target.value)}
            rows={4}
            autoFocus
          />
          <div className="nav" style={{marginTop:24}}>
            <button className="btn-go" onClick={next} disabled={!problem.trim()}>Continue</button>
          </div>
        </div>
      );

      case 1: return (
        <div className="step-wrap">
          <div className="step-tag">II</div>
          <div className="step-q">How does it feel?</div>
          <div className="step-hint">Choose the word that fits closest. This helps find the right emotional register in the historical record.</div>
          <div className="chip-set">
            {EMOTIONS.map(e => (
              <button key={e} className={"chip"+(emotion===e?" on":"")} onClick={()=>setEmotion(e)}>{e}</button>
            ))}
          </div>
          <div className="nav">
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={next}>Continue</button>
          </div>
        </div>
      );

      case 2: return (
        <div className="step-wrap">
          <div className="step-tag">III</div>
          <div className="step-q">How many voices?</div>
          <div className="step-hint">Three is enough to sit with. Five if you want the full breadth.</div>
          <div className="chip-set" style={{marginBottom:32}}>
            {COUNTS.map(c => (
              <button key={c} className={"chip"+(count===c?" on":"")} onClick={()=>setCount(c)}>{c} mentors</button>
            ))}
          </div>
          <div style={{marginTop:8}}>
            <div className="sum-line">Your situation: <strong>"{problem.slice(0,80)}{problem.length>80?"...":""}"</strong></div>
            <div className="sum-line">Feeling: <strong>{emotion}</strong></div>
          </div>
          <div className="nav">
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={()=>{ setStep(10); runSearch(); }}>Search the archives →</button>
          </div>
        </div>
      );

      default: return null;
    }
  }

  return (
    <div className="shell">
      <div className="top-bar">
        <div className="wordmark">Dead <em>Mentors</em></div>
        {step < 3 && <ProgressTrack current={step} total={TOTAL_STEPS} />}
      </div>
      {renderContent()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
