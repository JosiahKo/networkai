<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetworkAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Serif+Display&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0e0e;--surface:#181818;--border:#272727;--border-hover:#3f3f3f;
  --text:#ededed;--text-muted:#5a5a5a;--text-dim:#8a8a8a;--accent-dim:#1f1f1f;
  --green:#4ade80;--green-bg:#071a0f;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.shell{max-width:620px;margin:0 auto;padding:0 28px 60px;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:32px 0 40px;border-bottom:1px solid var(--border);margin-bottom:52px;flex-shrink:0;}
.wordmark{font-size:13px;font-weight:500;letter-spacing:0.12em;color:var(--text-dim);text-transform:uppercase;}
.wordmark em{color:var(--text);font-style:normal;}
.progress-track{display:flex;gap:5px;align-items:center;}
.dot{width:18px;height:2px;border-radius:1px;background:var(--border);transition:background 0.35s;}
.dot.done{background:var(--text-muted);}.dot.active{background:var(--text);}
.step-wrap{flex:1;display:flex;flex-direction:column;min-height:480px;animation:fadeUp 0.28s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.step-eyebrow{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:18px;}
.step-q{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:var(--text);margin-bottom:10px;letter-spacing:-0.2px;line-height:1.3;}
.step-hint{font-size:13px;color:var(--text-muted);margin-bottom:40px;line-height:1.7;}
.input-line{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:17px;font-weight:300;padding:11px 0;outline:none;transition:border-color 0.2s;}
.input-line::placeholder{color:var(--text-muted);}.input-line:focus{border-bottom-color:var(--text-dim);}
.criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px 44px;margin-bottom:36px;}
.cfield{display:flex;flex-direction:column;gap:7px;}
.cfield-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
.cfield .input-line{font-size:14px;padding:7px 0;}
.describe-wrap{margin-top:4px;}
.describe-divider{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.describe-divider span{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;}
.describe-divider::before,.describe-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.describe-area{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;font-weight:300;line-height:1.7;padding:14px 16px;outline:none;resize:none;transition:border-color 0.2s;min-height:86px;}
.describe-area::placeholder{color:var(--text-muted);}.describe-area:focus{border-color:var(--border-hover);}
.chip-set{display:flex;flex-wrap:wrap;gap:9px;margin-top:4px;}
.chip{padding:8px 17px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--border-hover);color:var(--text);}.chip.on{border-color:var(--text-dim);color:var(--text);background:var(--accent-dim);}
.nav{display:flex;align-items:center;gap:12px;margin-top:auto;padding-top:44px;}
.btn-primary{padding:11px 26px;background:var(--text);color:var(--bg);border:none;border-radius:2px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.03em;transition:opacity 0.15s;}
.btn-primary:hover{opacity:0.86;}
.btn-secondary{padding:11px 18px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:2px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;}
.btn-secondary:hover{color:var(--text);border-color:var(--border-hover);}
.btn-ghost{margin-left:auto;background:none;border:none;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;padding:4px;letter-spacing:0.02em;}
.btn-ghost:hover{color:var(--text-dim);}
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:480px;text-align:center;}
.loader-ring{width:32px;height:32px;border:1px solid var(--border);border-top-color:var(--text-dim);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:28px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-msg{font-size:14px;color:var(--text-dim);max-width:300px;line-height:1.6;}
.loader-sub{font-size:12px;color:var(--text-muted);margin-top:8px;}
.results-wrap{flex:1;padding-top:4px;}
.results-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.results-title{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;letter-spacing:-0.2px;}
.results-meta{font-size:12px;color:var(--text-muted);}
.results-tip{font-size:12px;color:var(--text-muted);line-height:1.7;padding:14px 16px;background:var(--surface);border-radius:3px;margin-bottom:32px;border-left:2px solid var(--border-hover);}
.person{border-top:1px solid var(--border);padding:30px 0;}
.person:last-of-type{border-bottom:1px solid var(--border);}
.person-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;}
.person-index{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--text-muted);padding-top:4px;min-width:22px;}
.person-info{flex:1;}
.person-name{font-size:16px;font-weight:500;margin-bottom:3px;letter-spacing:-0.1px;}
.person-role{font-size:13px;color:var(--text-muted);line-height:1.5;}
.person-score{font-size:10px;font-weight:500;letter-spacing:0.07em;color:var(--green);background:var(--green-bg);padding:4px 9px;border-radius:2px;flex-shrink:0;}
.person-tags{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 13px 38px;}
.person-tag{font-size:10px;color:var(--text-muted);border:1px solid var(--border);padding:3px 9px;border-radius:2px;letter-spacing:0.04em;}
.person-why{font-size:13px;color:var(--text-dim);line-height:1.75;margin:0 0 16px 38px;}
.person-path{font-size:12px;color:var(--text-muted);line-height:1.7;margin:0 0 16px 38px;padding:10px 13px;background:var(--surface);border-radius:3px;}
.person-path-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;}
.person-sources{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px 38px;}
.source-link{font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);text-decoration:none;padding-bottom:1px;transition:color 0.15s,border-color 0.15s;letter-spacing:0.02em;}
.source-link:hover{color:var(--text);border-color:var(--text-muted);}
.source-link.li{color:#4d94d4;border-color:#1d3d5a;}
.source-link.li:hover{color:#79b8f5;border-color:#4d94d4;}
.person-actions{display:flex;gap:10px;margin-left:38px;flex-wrap:wrap;}
.act-btn{font-size:11px;font-weight:500;letter-spacing:0.05em;font-family:'Inter',sans-serif;padding:7px 15px;border-radius:2px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text-muted);}
.act-btn:hover{border-color:var(--border-hover);color:var(--text);}
.expandable{margin:16px 0 0 38px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:20px 22px;}
.expand-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.email-body{font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--text-dim);}
.starters-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.starters-list li{font-size:13px;color:var(--text-dim);line-height:1.6;padding-left:16px;position:relative;}
.starters-list li::before{content:'—';position:absolute;left:0;color:var(--text-muted);}
.copy-btn{margin-top:14px;background:none;border:none;font-family:'Inter',sans-serif;font-size:11px;color:var(--text-muted);cursor:pointer;padding:0;letter-spacing:0.04em;text-transform:uppercase;}
.copy-btn:hover{color:var(--text-dim);}
.summary-line{font-size:15px;color:var(--text-dim);margin-bottom:10px;line-height:1.8;}
.summary-line strong{color:var(--text);font-weight:500;}
.restart-btn{margin-top:36px;background:none;border:none;font-family:'Inter',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;padding:0;letter-spacing:0.04em;}
.restart-btn:hover{color:var(--text-dim);}
.err-box{background:#160909;border:1px solid #331212;border-radius:3px;padding:16px 18px;font-size:13px;color:#f87171;line-height:1.7;margin-top:20px;}
.err-raw{margin-top:8px;font-size:11px;color:#555;font-family:monospace;word-break:break-all;max-height:100px;overflow-y:auto;}
@media(max-width:500px){.criteria-grid{grid-template-columns:1fr;gap:22px;}.step-q{font-size:24px;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // ── CLOUDFLARE WORKER URL ────────────────────────────────────
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
  // ────────────────────────────────────────────────────────────
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TOTAL_STEPS = 7;

const OUTREACH_OPTIONS = [
  "Coffee chat",
  "Recruiting tips",
  "Break into the industry",
  "Resume / application feedback",
  "Referral",
  "Interview prep",
  "General advice",
  "Mentorship",
];

const CONNECTION_TYPES = [
  "Current student (same school)",
  "Recent grad (1–3 yrs out)",
  "Mid-career alum (3–8 yrs)",
  "Senior professional (8+ yrs)",
  "Any level",
];

const COUNT_OPTIONS = ["3", "5"];

const LOAD_MSGS = [
  "Scanning alumni directories...",
  "Cross-referencing club rosters...",
  "Pinpointing the right profiles...",
  "Pulling LinkedIn handles...",
  "Verifying roles and companies...",
  "Identifying your strongest matches...",
  "Drafting personalized outreach...",
  "Almost there...",
];

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s, e + 1)); } catch(_) {} }
  return null;
}

function ProgressTrack({ current, total }) {
  return (
    <div className="progress-track">
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} className={"dot" + (i < current ? " done" : "") + (i === current ? " active" : "")} />
      ))}
    </div>
  );
}

function PersonCard({ person, idx }) {
  const [showEmail, setShowEmail] = useState(false);
  const [showStarters, setShowStarters] = useState(false);
  const [copied, setCopied] = useState(false);

  let subject = "", body = person.email || "";
  const m = (person.email || "").match(/^Subject:\s*(.+)/i);
  if (m) { subject = m[1].trim(); body = (person.email || "").replace(/^Subject:\s*.+\n*/i, "").trim(); }

  function copyEmail() {
    navigator.clipboard.writeText(person.email || "").then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    });
  }

  const sources = Array.isArray(person.otherSources) ? person.otherSources : [];
  const starters = Array.isArray(person.conversationStarters) ? person.conversationStarters : [];

  return (
    <div className="person">
      <div className="person-head">
        <div className="person-index">0{idx + 1}</div>
        <div className="person-info">
          <div className="person-name">{person.name}</div>
          <div className="person-role">
            {person.title}{person.company ? " · " + person.company : ""}
            {person.location ? " · " + person.location : ""}
          </div>
        </div>
        <div className="person-score">{person.matchScore}%</div>
      </div>

      {person.tags && person.tags.length > 0 && (
        <div className="person-tags">
          {person.tags.map((t, i) => <span key={i} className="person-tag">{t}</span>)}
        </div>
      )}

      <div className="person-why">{person.whyRelevant}</div>

      {person.theirPath && (
        <div className="person-path">
          <div className="person-path-label">Their path</div>
          {person.theirPath}
        </div>
      )}

      <div className="person-sources">
        {person.linkedinUrl && person.linkedinUrl !== "null" && (
          <a className="source-link li" href={person.linkedinUrl} target="_blank" rel="noopener noreferrer">↗ LinkedIn</a>
        )}
        {sources.map((src, i) => src && src.url && src.url !== "null" ? (
          <a key={i} className="source-link" href={src.url} target="_blank" rel="noopener noreferrer">↗ {src.label || "Source"}</a>
        ) : null)}
      </div>

      <div className="person-actions">
        <button className="act-btn" onClick={() => { setShowEmail(v => !v); setShowStarters(false); }}>
          {showEmail ? "Hide" : "Draft email"}
        </button>
        {starters.length > 0 && (
          <button className="act-btn" onClick={() => { setShowStarters(v => !v); setShowEmail(false); }}>
            {showStarters ? "Hide" : "Convo starters"}
          </button>
        )}
      </div>

      {showEmail && person.email && (
        <div className="expandable">
          <div className="expand-label">Cold email{subject ? " — " + subject : ""}</div>
          <div className="email-body">{body}</div>
          <button className="copy-btn" onClick={copyEmail}>{copied ? "✓ Copied" : "Copy email"}</button>
        </div>
      )}

      {showStarters && starters.length > 0 && (
        <div className="expandable">
          <div className="expand-label">Conversation starters</div>
          <ul className="starters-list">
            {starters.map((s, i) => <li key={i}>{s}</li>)}
          </ul>
        </div>
      )}
    </div>
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [myName, setMyName] = useState("");
  const [myBio, setMyBio] = useState("");
  const [targetGoal, setTargetGoal] = useState("");
  const [criteria, setCriteria] = useState({ school: "", major: "", gradYear: "", company: "", title: "", industry: "", location: "", prevExp: "" });
  const [freeText, setFreeText] = useState("");
  const [connType, setConnType] = useState("Any level");
  const [outreach, setOutreach] = useState("Coffee chat");
  const [count, setCount] = useState("3");

  const [loading, setLoading] = useState(false);
  const [loadIdx, setLoadIdx] = useState(0);
  const [results, setResults] = useState(null);
  const [error, setError] = useState("");
  const [rawDebug, setRawDebug] = useState("");
  const timerRef = useRef(null);

  const setC = (k, v) => setCriteria(f => ({ ...f, [k]: v }));

  useEffect(() => {
    if (loading) {
      setLoadIdx(0);
      timerRef.current = setInterval(() => setLoadIdx(i => (i + 1) % LOAD_MSGS.length), 2800);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [loading]);

  async function runSearch() {
    setError(""); setRawDebug(""); setResults(null); setLoading(true);

    const cParts = [
      criteria.school   ? "School: " + criteria.school : null,
      criteria.major    ? "Major: " + criteria.major : null,
      criteria.gradYear ? "Grad year (HARD FILTER): " + criteria.gradYear : null,
      criteria.company  ? "Company: " + criteria.company : null,
      criteria.title    ? "Title: " + criteria.title : null,
      criteria.industry ? "Industry: " + criteria.industry : null,
      criteria.location ? "Location: " + criteria.location : null,
      criteria.prevExp  ? "Prev experience: " + criteria.prevExp : null,
      connType !== "Any level" ? "Connection type: " + connType : null,
    ].filter(Boolean);

    const cStr = cParts.join(". ");
    const searchDesc = freeText.trim()
      ? (cStr ? cStr + ". " + freeText.trim() : freeText.trim())
      : (cStr || "any professional");

    const senderName = myName || "[Your Name]";
    const senderContext = myBio ? myBio : "a student";
    const targetContext = targetGoal ? "Their career target: " + targetGoal + "." : "";

    // Research prompt — targets LinkedIn via site: operator + public directories
    const researchPrompt = "Find " + count + " real people matching: " + searchDesc + ".\n" +
      "Sender: " + senderName + " (" + senderContext + "). " + targetContext + "\n\n" +
      "Use these search strategies in order:\n" +
      "1. Search Google with site:linkedin.com plus key terms, e.g.: site:linkedin.com \"Boston College\" \"JPMorgan\" \"investment banking\" \"analyst\"\n" +
      "2. Search for club rosters, alumni directories, athletic department pages, and company team pages\n" +
      "3. When you find a list or roster page, read it fully and extract ALL matching people\n" +
      "4. For each person found, note their full name, current title, company, graduation year, LinkedIn URL, and the page where you found them\n\n" +
      "Do 2-3 targeted searches. Write a brief plain-text summary of every person you found with all details.";

    const jsonPrompt = "Convert these research notes to a JSON array. Return ONLY the array starting with [. No explanation.\n\n" +
      "Notes:\n" + "FINDINGS_PLACEHOLDER" + "\n\n" +
      "Each object: {\"name\":\"\",\"title\":\"\",\"company\":\"\",\"location\":\"\",\"linkedinUrl\":\"url or null\"," +
      "\"otherSources\":[{\"label\":\"\",\"url\":\"\"}]," +
      "\"matchScore\":85,\"tags\":[\"tag1\",\"tag2\",\"tag3\"]," +
      "\"whyRelevant\":\"2 sentences on why they are a great connection.\"," +
      "\"theirPath\":\"1 sentence on how they got from college to their current role, if discernible. null if unknown.\"," +
      "\"conversationStarters\":[\"Question 1 specific to their background\",\"Question 2\",\"Question 3\"]," +
      "\"email\":\"Subject: Subject line\\n\\nOpening line.\\n\\nBody under 80 words. Tone: " +
      (connType.includes("Senior") || connType.includes("Mid") ? "professional and respectful" : "warm and peer-like") +
      ". Reference their specific background.\\n\\nBest,\\n" + senderName + "\"}\n\nStart with [:";

    try {
      // Turn 1 — web research (keep max_tokens LOW to limit token usage)
      const r1 = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 700,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: researchPrompt }]
        })
      });

      if (!r1.ok) {
        const e = await r1.json().catch(() => ({}));
        throw new Error(e.error?.message || "HTTP " + r1.status);
      }

      const d1 = await r1.json();

      // Extract ONLY final text blocks — not tool_result blocks (which are huge)
      const findings = d1.content
        .filter(b => b.type === "text")
        .map(b => b.text)
        .join("\n")
        .slice(0, 2000);

      setRawDebug(findings.slice(0, 400));

      if (!findings.trim()) throw new Error("The search returned no results. Try adjusting your criteria.");

      // Pause to spread token usage across the rate-limit window
      await new Promise(r => setTimeout(r, 8000));

      // Turn 2 — fresh conversation, no tool history, just format findings as JSON
      const finalPrompt = jsonPrompt.replace("FINDINGS_PLACEHOLDER", findings);

      const r2 = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 2500,
          messages: [{ role: "user", content: finalPrompt }]
        })
      });

      if (!r2.ok) {
        const e = await r2.json().catch(() => ({}));
        throw new Error(e.error?.message || "HTTP " + r2.status);
      }

      const d2 = await r2.json();
      const jsonText = d2.content.filter(b => b.type === "text").map(b => b.text).join("\n");
      const parsed = extractJSON(jsonText);

      if (!parsed || !Array.isArray(parsed) || parsed.length === 0) {
        throw new Error("Could not parse results.\n\nRaw: " + jsonText.slice(0, 300));
      }

      setResults(parsed);
      setStep(8);
    } catch(e) {
      setError(e.message);
      setStep(9);
    } finally {
      setLoading(false);
    }
  }

  const next = () => setStep(s => s + 1);
  const back = () => setStep(s => s - 1);
  function restart() { setStep(0); setResults(null); setError(""); setRawDebug(""); }

  if (loading) return (
    <div className="shell">
      <div className="top-bar"><div className="wordmark">Network<em>AI</em></div></div>
      <div className="loading-wrap">
        <div className="loader-ring" />
        <div className="loader-msg">{LOAD_MSGS[loadIdx]}</div>
        <div className="loader-sub">Usually takes 25–45 seconds</div>
      </div>
    </div>
  );

  function renderContent() {

    // Results screen
    if (step === 8 && results) return (
      <div className="results-wrap">
        <div className="results-head">
          <div className="results-title">Your matches</div>
          <div className="results-meta">{results.length} found</div>
        </div>
        <div className="results-tip">
          <strong style={{color:"var(--text-dim)"}}>Quick tip:</strong> The best cold emails are short, specific, and ask for one small thing — a 15-minute call, not a job. Reference something real about them. Most people reply when they feel genuinely seen.
        </div>
        {results.map((p, i) => <PersonCard key={i} person={p} idx={i} />)}
        <button className="restart-btn" onClick={restart}>← New search</button>
      </div>
    );

    // Error screen
    if (step === 9) return (
      <div className="step-wrap">
        <div className="step-eyebrow">Something went wrong</div>
        <div className="step-q">Search failed.</div>
        <div className="err-box">
          {error}
          {rawDebug && <div className="err-raw">{rawDebug}</div>}
        </div>
        <div className="nav">
          <button className="btn-secondary" onClick={() => { setError(""); setStep(6); }}>Try again</button>
          <button className="btn-ghost" onClick={restart}>Start over</button>
        </div>
      </div>
    );

    switch (step) {
      case 0: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">What's your name?</div>
          <div className="step-hint">We'll sign every email draft with this.</div>
          <input className="input-line" placeholder="Your full name" value={myName} onChange={e => setMyName(e.target.value)} onKeyDown={e => e.key === "Enter" && next()} autoFocus />
          <div className="nav">
            <button className="btn-primary" onClick={next}>Continue</button>
            <button className="btn-ghost" onClick={next}>Skip</button>
          </div>
        </div>
      );

      case 1: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">Tell me about yourself.</div>
          <div className="step-hint">Your year, school, major, and what you're working toward. This context makes the emails far more personal.</div>
          <input className="input-line" placeholder="e.g. Junior at BC studying Finance, interested in IB at a bulge bracket" value={myBio} onChange={e => setMyBio(e.target.value)} onKeyDown={e => e.key === "Enter" && next()} autoFocus />
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={next}>Continue</button>
            <button className="btn-ghost" onClick={next}>Skip</button>
          </div>
        </div>
      );

      case 2: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">What's your end goal?</div>
          <div className="step-hint">The role or company you're ultimately trying to land. This helps find people who walked the exact path you want.</div>
          <input className="input-line" placeholder="e.g. Investment banking analyst at Goldman Sachs or JPMorgan" value={targetGoal} onChange={e => setTargetGoal(e.target.value)} onKeyDown={e => e.key === "Enter" && next()} autoFocus />
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={next}>Continue</button>
            <button className="btn-ghost" onClick={next}>Skip</button>
          </div>
        </div>
      );

      case 3: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">Who are you looking for?</div>
          <div className="step-hint">Fill in what's relevant. Everything is optional — the more specific, the better.</div>
          <div className="criteria-grid">
            <div className="cfield"><div className="cfield-label">School / University</div><input className="input-line" placeholder="e.g. Boston College" value={criteria.school} onChange={e => setC("school", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">Major / Field</div><input className="input-line" placeholder="e.g. Finance, Economics" value={criteria.major} onChange={e => setC("major", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">Graduation year</div><input className="input-line" placeholder="e.g. 2022–2025" value={criteria.gradYear} onChange={e => setC("gradYear", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">Current company</div><input className="input-line" placeholder="e.g. JPMorgan, Goldman" value={criteria.company} onChange={e => setC("company", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">Job title / Role</div><input className="input-line" placeholder="e.g. Analyst, Associate, VP" value={criteria.title} onChange={e => setC("title", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">Industry</div><input className="input-line" placeholder="e.g. Investment Banking" value={criteria.industry} onChange={e => setC("industry", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">City / Location</div><input className="input-line" placeholder="e.g. New York, Boston" value={criteria.location} onChange={e => setC("location", e.target.value)} /></div>
            <div className="cfield"><div className="cfield-label">Previous experience</div><input className="input-line" placeholder="e.g. Ex-Deloitte, Big 4" value={criteria.prevExp} onChange={e => setC("prevExp", e.target.value)} /></div>
          </div>
          <div className="describe-wrap">
            <div className="describe-divider"><span>or describe in your own words</span></div>
            <textarea className="describe-area" placeholder='e.g. "BC alums who are now analysts at JPMorgan IB in NYC who graduated between 2021–2024"' value={freeText} onChange={e => setFreeText(e.target.value)} rows={3} />
          </div>
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={next}>Continue</button>
          </div>
        </div>
      );

      case 4: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">What kind of connection?</div>
          <div className="step-hint">Near-peers (1–3 years out) tend to reply more often and remember exactly what the process was like. Senior professionals can open bigger doors but are harder to reach.</div>
          <div className="chip-set">
            {CONNECTION_TYPES.map(o => (
              <button key={o} className={"chip" + (connType === o ? " on" : "")} onClick={() => setConnType(o)}>{o}</button>
            ))}
          </div>
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={next}>Continue</button>
          </div>
        </div>
      );

      case 5: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">What do you want from them?</div>
          <div className="step-hint">Be specific — people are more likely to say yes to a clear, small ask.</div>
          <div className="chip-set">
            {OUTREACH_OPTIONS.map(o => (
              <button key={o} className={"chip" + (outreach === o ? " on" : "")} onClick={() => setOutreach(o)}>{o}</button>
            ))}
          </div>
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={next}>Continue</button>
          </div>
        </div>
      );

      case 6: return (
        <div className="step-wrap">
          <div className="step-eyebrow">{step + 1} / {TOTAL_STEPS}</div>
          <div className="step-q">How many matches?</div>
          <div className="step-hint">Start with 3. Quality over quantity — one well-researched email beats five generic ones.</div>
          <div className="chip-set">
            {COUNT_OPTIONS.map(c => (
              <button key={c} className={"chip" + (count === c ? " on" : "")} onClick={() => setCount(c)}>{c} people</button>
            ))}
          </div>
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={next}>Continue</button>
          </div>
        </div>
      );

      case 7: return (
        <div className="step-wrap">
          <div className="step-eyebrow">Ready</div>
          <div className="step-q">Here's what I'll search for.</div>
          <div style={{ marginBottom: 8 }}>
            {freeText.trim() && <div className="summary-line">"{freeText.trim()}"</div>}
            {criteria.school && <div className="summary-line">School: <strong>{criteria.school}</strong></div>}
            {criteria.gradYear && <div className="summary-line">Grad year: <strong>{criteria.gradYear}</strong></div>}
            {criteria.company && <div className="summary-line">Company: <strong>{criteria.company}</strong></div>}
            {criteria.title && <div className="summary-line">Role: <strong>{criteria.title}</strong></div>}
            {criteria.location && <div className="summary-line">Location: <strong>{criteria.location}</strong></div>}
            {!freeText.trim() && !criteria.school && !criteria.company && !criteria.title && (
              <div className="summary-line">General professional search</div>
            )}
            <div className="summary-line" style={{ marginTop: 12 }}>
              Connection: <strong>{connType}</strong> · Goal: <strong>{outreach}</strong> · Finding <strong>{count} people</strong>
            </div>
          </div>
          <div className="nav">
            <button className="btn-secondary" onClick={back}>Back</button>
            <button className="btn-primary" onClick={() => { setStep(10); runSearch(); }}>Find people →</button>
          </div>
        </div>
      );

      default: return null;
    }
  }

  return (
    <div className="shell">
      <div className="top-bar">
        <div className="wordmark">Network<em>AI</em></div>
        {step < 8 && step !== 9 && <ProgressTrack current={step} total={TOTAL_STEPS} />}
      </div>
      {renderContent()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
