<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PitchMatch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f2ec;
  --ink:#1a1714;
  --ink2:#6b6560;
  --ink3:#a09a94;
  --surface:#edeae3;
  --surface2:#e4e0d8;
  --border:#d4cfc7;
  --accent:#c8502a;
  --accent2:#e8693f;
  --green:#2d6a4f;
  --green-bg:#d8f3dc;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.shell{max-width:680px;margin:0 auto;padding:0 28px 80px;min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:28px 0 36px;border-bottom:1.5px solid var(--border);margin-bottom:48px;flex-shrink:0;}
.wordmark{font-size:18px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);}
.wordmark span{color:var(--accent);}
.progress-track{display:flex;gap:4px;}
.ptick{width:20px;height:3px;border-radius:2px;background:var(--border);transition:background 0.3s;}
.ptick.done{background:var(--ink3);}
.ptick.active{background:var(--accent);}

/* Steps */
.step-wrap{flex:1;display:flex;flex-direction:column;min-height:460px;animation:up 0.25s ease both;}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.step-tag{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
.step-q{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;color:var(--ink);margin-bottom:10px;line-height:1.25;font-style:italic;}
.step-hint{font-size:13px;color:var(--ink2);margin-bottom:36px;line-height:1.7;font-family:'Syne',sans-serif;}

/* Inputs */
.input-line{width:100%;background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--ink);font-family:'Syne',sans-serif;font-size:18px;font-weight:500;padding:10px 0;outline:none;transition:border-color 0.2s;}
.input-line::placeholder{color:var(--ink3);font-weight:400;}
.input-line:focus{border-bottom-color:var(--accent);}
.textarea-line{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--ink);font-family:'Syne',sans-serif;font-size:14px;font-weight:400;line-height:1.7;padding:14px 16px;outline:none;resize:none;transition:border-color 0.2s;min-height:90px;}
.textarea-line::placeholder{color:var(--ink3);}
.textarea-line:focus{border-color:var(--accent);}

/* Chips */
.chip-set{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.chip{padding:8px 18px;border-radius:30px;border:1.5px solid var(--border);background:transparent;color:var(--ink2);font-family:'Syne',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.on{border-color:var(--accent);color:var(--bg);background:var(--accent);}

/* Nav */
.nav{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:40px;}
.btn-go{padding:12px 28px;background:var(--ink);color:var(--bg);border:none;border-radius:4px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;text-transform:uppercase;}
.btn-go:hover{background:var(--accent);}
.btn-back{padding:12px 18px;background:transparent;color:var(--ink2);border:1.5px solid var(--border);border-radius:4px;font-family:'Syne',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-back:hover{color:var(--ink);border-color:var(--ink2);}
.btn-skip{margin-left:auto;background:none;border:none;color:var(--ink3);font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;padding:4px;letter-spacing:0.03em;}
.btn-skip:hover{color:var(--ink2);}

/* Loading */
.load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:460px;text-align:center;}
.load-icon{width:48px;height:48px;margin-bottom:24px;position:relative;}
.load-icon::before,.load-icon::after{content:'';position:absolute;border-radius:50%;}
.load-icon::before{inset:0;border:2px solid var(--border);}
.load-icon::after{inset:0;border:2px solid transparent;border-top-color:var(--accent);animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.load-sub{font-size:12px;color:var(--ink2);letter-spacing:0.03em;}

/* Results */
.results-wrap{flex:1;padding-top:4px;}
.results-head{margin-bottom:10px;}
.results-title{font-family:'Instrument Serif',serif;font-size:32px;font-style:italic;letter-spacing:-0.01em;}
.results-meta{font-size:12px;color:var(--ink2);margin-top:4px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;}
.results-tip{font-size:12px;color:var(--ink2);line-height:1.7;padding:12px 16px;background:var(--surface);border-radius:4px;margin:16px 0 28px;border-left:3px solid var(--accent);}

/* Investor card */
.inv-card{border-top:1.5px solid var(--border);padding:28px 0;}
.inv-card:last-of-type{border-bottom:1.5px solid var(--border);}
.inv-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
.inv-num{font-size:10px;font-weight:700;color:var(--ink3);padding-top:5px;min-width:22px;letter-spacing:0.08em;}
.inv-info{flex:1;}
.inv-name{font-size:18px;font-weight:700;margin-bottom:2px;letter-spacing:-0.01em;}
.inv-role{font-size:13px;color:var(--ink2);line-height:1.5;}
.inv-score{font-size:10px;font-weight:700;letter-spacing:0.08em;color:var(--green);background:var(--green-bg);padding:4px 10px;border-radius:20px;flex-shrink:0;}

.inv-focus{font-size:13px;color:var(--ink2);line-height:1.7;margin:0 0 12px 36px;font-style:italic;}

.portfolio-row{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px 36px;}
.portfolio-tag{font-size:11px;font-weight:600;color:var(--accent);background:#fdf0ec;border:1px solid #f0c4b4;padding:3px 10px;border-radius:20px;letter-spacing:0.03em;}

.inv-why{font-size:13px;color:var(--ink);line-height:1.75;margin:0 0 14px 36px;}

.inv-links{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px 36px;}
.inv-link{font-size:11px;font-weight:600;color:var(--ink2);border-bottom:1px solid var(--border);text-decoration:none;padding-bottom:1px;letter-spacing:0.04em;transition:all 0.15s;text-transform:uppercase;}
.inv-link:hover{color:var(--accent);border-color:var(--accent);}
.inv-link.primary{color:var(--accent);border-color:#f0c4b4;}
.inv-link.primary:hover{color:var(--accent2);}

.inv-actions{display:flex;gap:8px;margin-left:36px;flex-wrap:wrap;}
.act-btn{font-size:11px;font-weight:700;letter-spacing:0.06em;font-family:'Syne',sans-serif;padding:7px 14px;border-radius:3px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;border:1.5px solid var(--border);background:transparent;color:var(--ink2);}
.act-btn:hover{border-color:var(--ink2);color:var(--ink);}

.pitch-block{margin:14px 0 0 36px;background:var(--surface);border:1.5px solid var(--border);border-radius:4px;padding:18px 20px;}
.pitch-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.pitch-body{font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--ink2);}
.copy-btn{margin-top:12px;background:none;border:none;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ink3);cursor:pointer;padding:0;letter-spacing:0.06em;text-transform:uppercase;}
.copy-btn:hover{color:var(--ink2);}

/* Summary */
.summary-line{font-size:14px;color:var(--ink2);margin-bottom:8px;line-height:1.8;}
.summary-line strong{color:var(--ink);font-weight:600;}

.restart-btn{margin-top:32px;background:none;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;padding:0;letter-spacing:0.06em;text-transform:uppercase;}
.restart-btn:hover{color:var(--ink2);}

.err-box{background:#fdf0ec;border:1.5px solid #f0c4b4;border-radius:4px;padding:16px 18px;font-size:13px;color:#8b3520;line-height:1.7;margin-top:20px;}
.err-raw{margin-top:8px;font-size:11px;color:#c4a090;font-family:monospace;word-break:break-all;max-height:80px;overflow-y:auto;}

@media(max-width:500px){.step-q{font-size:26px;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // ── CLOUDFLARE WORKER URL ────────────────────────────────────
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
  // ────────────────────────────────────────────────────────────
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TOTAL_STEPS = 6;

const STAGES = ["Pre-idea / exploring","Pre-seed","Seed","Series A","Series B+"];
const SECTORS = ["Fintech","Healthtech","EdTech","Climate / Cleantech","Consumer","B2B SaaS","AI / ML","Biotech","Real estate tech","Logistics","Defense / deep tech","Social / creator economy","Other"];
const ASKS = ["Intro call","Investment consideration","Advice / feedback","Warm intro to other investors","Co-investor"];
const COUNTS = ["3","5"];

const LOAD_MSGS = [
  "Scanning investor portfolios...",
  "Matching your thesis to known deals...",
  "Cross-referencing fund mandates...",
  "Finding who backed companies like yours...",
  "Pulling contact intel...",
  "Drafting your pitch emails...",
  "Almost ready...",
];

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s,e+1)); } catch(_) {} }
  return null;
}

function ProgressTrack({ current, total }) {
  return (
    <div className="progress-track">
      {Array.from({length:total}).map((_,i) => (
        <div key={i} className={"ptick" + (i<current?" done":"") + (i===current?" active":"")} />
      ))}
    </div>
  );
}

function InvestorCard({ inv, idx }) {
  const [showPitch, setShowPitch] = useState(false);
  const [copied, setCopied] = useState(false);

  let subject = "", body = inv.email || "";
  const m = (inv.email||"").match(/^Subject:\s*(.+)/i);
  if (m) { subject = m[1].trim(); body = (inv.email||"").replace(/^Subject:\s*.+\n*/i,"").trim(); }

  function copy() {
    navigator.clipboard.writeText(inv.email||"").then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  }

  const sources = Array.isArray(inv.otherSources) ? inv.otherSources : [];
  const portfolio = Array.isArray(inv.notablePortfolio) ? inv.notablePortfolio : [];

  return (
    <div className="inv-card">
      <div className="inv-top">
        <div className="inv-num">0{idx+1}</div>
        <div className="inv-info">
          <div className="inv-name">{inv.name}</div>
          <div className="inv-role">{inv.title}{inv.firm ? " · " + inv.firm : ""}{inv.location ? " · " + inv.location : ""}</div>
        </div>
        <div className="inv-score">{inv.matchScore}%</div>
      </div>

      {inv.investmentFocus && <div className="inv-focus">"{inv.investmentFocus}"</div>}

      {portfolio.length > 0 && (
        <div className="portfolio-row">
          {portfolio.map((c,i) => <span key={i} className="portfolio-tag">{c}</span>)}
        </div>
      )}

      <div className="inv-why">{inv.whyRelevant}</div>

      <div className="inv-links">
        {inv.profileUrl && inv.profileUrl !== "null" && (
          <a className="inv-link primary" href={inv.profileUrl} target="_blank" rel="noopener noreferrer">↗ Profile</a>
        )}
        {sources.map((s,i) => s&&s.url&&s.url!=="null" ? (
          <a key={i} className="inv-link" href={s.url} target="_blank" rel="noopener noreferrer">↗ {s.label||"Source"}</a>
        ) : null)}
      </div>

      <div className="inv-actions">
        <button className="act-btn" onClick={()=>setShowPitch(v=>!v)}>
          {showPitch ? "Hide pitch" : "Pitch email"}
        </button>
      </div>

      {showPitch && inv.email && (
        <div className="pitch-block">
          <div className="pitch-label">{subject ? "Subject: " + subject : "Cold pitch"}</div>
          <div className="pitch-body">{body}</div>
          <button className="copy-btn" onClick={copy}>{copied ? "✓ Copied" : "Copy email"}</button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [founderName, setFounderName] = useState("");
  const [founderBio, setFounderBio] = useState("");
  const [startupDesc, setStartupDesc] = useState("");
  const [sector, setSector] = useState("Fintech");
  const [stage, setStage] = useState("Pre-seed");
  const [ask, setAsk] = useState("Intro call");
  const [count, setCount] = useState("3");

  const [loading, setLoading] = useState(false);
  const [loadIdx, setLoadIdx] = useState(0);
  const [results, setResults] = useState(null);
  const [error, setError] = useState("");
  const [rawDebug, setRawDebug] = useState("");
  const timerRef = useRef(null);

  useEffect(() => {
    if (loading) {
      setLoadIdx(0);
      timerRef.current = setInterval(() => setLoadIdx(i => (i+1) % LOAD_MSGS.length), 2600);
    } else { clearInterval(timerRef.current); }
    return () => clearInterval(timerRef.current);
  }, [loading]);

  async function runSearch() {
    setError(""); setRawDebug(""); setResults(null); setLoading(true);
    try {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ startupDesc, stage, sector, ask, founderName, founderBio, count })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setRawDebug(data.debug || "");
      const parsed = extractJSON(data.jsonText || "");
      if (!parsed || !Array.isArray(parsed) || parsed.length === 0) {
        throw new Error("Could not parse results.\n\n" + (data.jsonText||"").slice(0,300));
      }
      setResults(parsed);
      setStep(8);
    } catch(e) {
      setError(e.message);
      setStep(9);
    } finally { setLoading(false); }
  }

  const next = () => setStep(s => s+1);
  const back = () => setStep(s => s-1);
  function restart() { setStep(0); setResults(null); setError(""); setRawDebug(""); }

  if (loading) return (
    <div className="shell">
      <div className="top-bar"><div className="wordmark">Pitch<span>Match</span></div></div>
      <div className="load-wrap">
        <div className="load-icon" />
        <div className="load-msg">{LOAD_MSGS[loadIdx]}</div>
        <div className="load-sub">Usually 15–25 seconds</div>
      </div>
    </div>
  );

  function renderContent() {
    if (step === 8 && results) return (
      <div className="results-wrap">
        <div className="results-head">
          <div className="results-title">Your investors.</div>
          <div className="results-meta">{results.length} matched · {sector} · {stage}</div>
        </div>
        <div className="results-tip">
          The best cold pitches are 3–4 sentences: what you're building, why you're the person to build it, and one specific reason you're reaching out to them. No deck attachments on first contact.
        </div>
        {results.map((inv,i) => <InvestorCard key={i} inv={inv} idx={i} />)}
        <button className="restart-btn" onClick={restart}>← New search</button>
      </div>
    );

    if (step === 9) return (
      <div className="step-wrap">
        <div className="step-tag">Error</div>
        <div className="step-q">Something went wrong.</div>
        <div className="err-box">
          {error}
          {rawDebug && <div className="err-raw">{rawDebug}</div>}
        </div>
        <div className="nav">
          <button className="btn-go" onClick={()=>{ setError(""); setStep(5); }}>Try again</button>
          <button className="btn-skip" onClick={restart}>Start over</button>
        </div>
      </div>
    );

    switch(step) {
      case 0: return (
        <div className="step-wrap">
          <div className="step-tag">{step+1} / {TOTAL_STEPS}</div>
          <div className="step-q">What's your name?</div>
          <div className="step-hint">Your pitch emails will be signed with this.</div>
          <input className="input-line" placeholder="Your full name" value={founderName} onChange={e=>setFounderName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&next()} autoFocus />
          <div className="nav">
            <button className="btn-go" onClick={next}>Continue</button>
            <button className="btn-skip" onClick={next}>Skip</button>
          </div>
        </div>
      );
      case 1: return (
        <div className="step-wrap">
          <div className="step-tag">{step+1} / {TOTAL_STEPS}</div>
          <div className="step-q">Tell me about yourself.</div>
          <div className="step-hint">Your background as a founder — why you're the right person to build this.</div>
          <input className="input-line" placeholder="e.g. Ex-Goldman analyst, 2x founder, MIT CS grad" value={founderBio} onChange={e=>setFounderBio(e.target.value)} onKeyDown={e=>e.key==="Enter"&&next()} autoFocus />
          <div className="nav">
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={next}>Continue</button>
            <button className="btn-skip" onClick={next}>Skip</button>
          </div>
        </div>
      );
      case 2: return (
        <div className="step-wrap">
          <div className="step-tag">{step+1} / {TOTAL_STEPS}</div>
          <div className="step-q">What are you building?</div>
          <div className="step-hint">One or two sentences. Be specific — the clearer the problem and market, the better the investor matches.</div>
          <textarea className="textarea-line" placeholder='e.g. "A platform that automates compliance for crypto exchanges. Targeting mid-size exchanges spending $2M+/yr on manual compliance ops."' value={startupDesc} onChange={e=>setStartupDesc(e.target.value)} rows={3} autoFocus />
          <div className="nav" style={{marginTop:24}}>
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={next}>Continue</button>
          </div>
        </div>
      );
      case 3: return (
        <div className="step-wrap">
          <div className="step-tag">{step+1} / {TOTAL_STEPS}</div>
          <div className="step-q">What sector are you in?</div>
          <div className="step-hint">Pick the closest fit — this shapes which investor theses we match against.</div>
          <div className="chip-set">
            {SECTORS.map(s => <button key={s} className={"chip"+(sector===s?" on":"")} onClick={()=>setSector(s)}>{s}</button>)}
          </div>
          <div className="nav">
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={next}>Continue</button>
          </div>
        </div>
      );
      case 4: return (
        <div className="step-wrap">
          <div className="step-tag">{step+1} / {TOTAL_STEPS}</div>
          <div className="step-q">What stage are you at?</div>
          <div className="step-hint">Different stages attract different investor profiles. Be honest.</div>
          <div className="chip-set" style={{marginBottom:24}}>
            {STAGES.map(s => <button key={s} className={"chip"+(stage===s?" on":"")} onClick={()=>setStage(s)}>{s}</button>)}
          </div>
          <div className="step-hint" style={{marginBottom:12}}>What are you asking for?</div>
          <div className="chip-set">
            {ASKS.map(a => <button key={a} className={"chip"+(ask===a?" on":"")} onClick={()=>setAsk(a)}>{a}</button>)}
          </div>
          <div className="nav">
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={next}>Continue</button>
          </div>
        </div>
      );
      case 5: return (
        <div className="step-wrap">
          <div className="step-tag">Ready</div>
          <div className="step-q">Here's the pitch.</div>
          <div style={{marginBottom:8}}>
            {startupDesc && <div className="summary-line">"{startupDesc}"</div>}
            <div className="summary-line">Sector: <strong>{sector}</strong></div>
            <div className="summary-line">Stage: <strong>{stage}</strong></div>
            <div className="summary-line">Ask: <strong>{ask}</strong></div>
            <div className="summary-line" style={{marginTop:10}}>Finding <strong>{count} investors</strong> who fund companies like this.</div>
          </div>
          <div style={{marginTop:16}}>
            <div className="step-hint" style={{marginBottom:10}}>How many matches?</div>
            <div className="chip-set">
              {COUNTS.map(c => <button key={c} className={"chip"+(count===c?" on":"")} onClick={()=>setCount(c)}>{c} investors</button>)}
            </div>
          </div>
          <div className="nav">
            <button className="btn-back" onClick={back}>Back</button>
            <button className="btn-go" onClick={()=>{ setStep(10); runSearch(); }}>Find investors →</button>
          </div>
        </div>
      );
      default: return null;
    }
  }

  return (
    <div className="shell">
      <div className="top-bar">
        <div className="wordmark">Pitch<span>Match</span></div>
        {step < 6 && <ProgressTrack current={step} total={TOTAL_STEPS} />}
      </div>
      {renderContent()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
