<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DupeFit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Neue+Haas+Grotesk:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f6f2;
  --surface:#ffffff;
  --surface2:#f0ede8;
  --border:#e2ddd6;
  --border2:#ccc7be;
  --ink:#1a1814;
  --ink2:#6b6560;
  --ink3:#a09890;
  --ink4:#c8c2ba;
  --accent:#1a1814;
  --tag-bg:#1a1814;
  --tag-text:#f8f6f2;
  --green:#1a6644;
  --green-bg:#e8f5ef;
  --pink:#c2185b;
  --pink-bg:#fce4ec;
}
html{background:var(--bg);}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.shell{max-width:560px;margin:0 auto;padding:0 20px 80px;min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:32px;flex-shrink:0;}
.wordmark{font-size:17px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);}
.wordmark span{color:var(--ink3);}
.beta{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;background:var(--tag-bg);color:var(--tag-text);padding:2px 7px;border-radius:2px;margin-left:8px;vertical-align:middle;}

/* Upload screen */
.upload-wrap{flex:1;display:flex;flex-direction:column;}
.upload-hero{margin-bottom:28px;}
.upload-title{font-size:26px;font-weight:600;letter-spacing:-0.03em;margin-bottom:8px;line-height:1.2;}
.upload-hint{font-size:14px;color:var(--ink2);line-height:1.7;}

/* Drop zone */
.dropzone{
  border:1.5px dashed var(--border2);border-radius:8px;
  padding:40px 20px;text-align:center;cursor:pointer;
  transition:all 0.2s;background:var(--surface);
  margin-bottom:16px;position:relative;overflow:hidden;
}
.dropzone:hover,.dropzone.dragover{border-color:var(--ink);background:var(--surface2);}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dropzone-icon{font-size:32px;margin-bottom:10px;}
.dropzone-text{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:4px;}
.dropzone-sub{font-size:12px;color:var(--ink3);}

/* Preview */
.preview-wrap{position:relative;margin-bottom:16px;}
.preview-img{width:100%;max-height:400px;object-fit:contain;border-radius:6px;border:1px solid var(--border);background:var(--surface);}
.preview-clear{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,0.6);color:white;border:none;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* Budget selector */
.section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.budget-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.budget-chip{
  padding:8px 16px;border:1.5px solid var(--border);border-radius:30px;
  background:transparent;color:var(--ink2);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;
}
.budget-chip:hover{border-color:var(--ink2);color:var(--ink);}
.budget-chip.on{border-color:var(--ink);background:var(--ink);color:white;}

.style-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}

/* CTA */
.btn-go{
  width:100%;padding:14px;background:var(--ink);color:var(--bg);
  border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:0.02em;border-radius:4px;transition:opacity 0.15s;
}
.btn-go:hover{opacity:0.85;}
.btn-go:disabled{opacity:0.35;cursor:not-allowed;}

/* Loading */
.load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0;}
.load-ring{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.load-sub{font-size:12px;color:var(--ink3);}

/* Results */
.results-wrap{flex:1;}
.results-header{margin-bottom:8px;}
.results-title{font-size:24px;font-weight:600;letter-spacing:-0.02em;}
.results-sub{font-size:13px;color:var(--ink3);margin-top:3px;}
.total-savings{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--green-bg);border:1px solid #b8dccb;
  border-radius:4px;padding:8px 14px;margin:14px 0 24px;
  font-size:13px;font-weight:600;color:var(--green);
}

/* Piece card */
.piece-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 18px 14px;margin-bottom:12px;}
.piece-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.piece-name{font-size:15px;font-weight:600;letter-spacing:-0.01em;}
.piece-original{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;}
.piece-desc{font-size:13px;color:var(--ink2);margin-bottom:14px;}

/* Alt items */
.alt-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 12px;background:var(--surface2);
  border-radius:4px;margin-bottom:6px;
  text-decoration:none;color:inherit;
  border:1px solid transparent;transition:border-color 0.15s;
}
.alt-item:hover{border-color:var(--border2);}
.alt-item:last-of-type{margin-bottom:0;}
.alt-store{
  font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--ink3);white-space:nowrap;padding-top:1px;min-width:60px;
}
.alt-details{flex:1;min-width:0;}
.alt-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.alt-why{font-size:12px;color:var(--ink2);line-height:1.5;}
.alt-price{font-size:13px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace;white-space:nowrap;padding-top:1px;}

.secondhand-tip{
  margin-top:10px;padding:9px 12px;
  background:var(--pink-bg);border-radius:4px;
  font-size:12px;color:var(--pink);line-height:1.6;
  border:1px solid #f0b8cc;
}
.secondhand-tip::before{content:'♻ ';font-size:11px;}

.reset-btn{
  margin-top:20px;width:100%;padding:11px;background:transparent;
  color:var(--ink3);border:1px solid var(--border);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;border-radius:4px;transition:all 0.15s;letter-spacing:0.02em;
}
.reset-btn:hover{border-color:var(--border2);color:var(--ink);}

.err-box{background:#fff0f0;border:1px solid #ffcdd2;border-radius:4px;padding:14px 16px;font-size:13px;color:#c62828;line-height:1.7;margin-top:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // ── CLOUDFLARE WORKER URL ────────────────────────────────────
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
  // ────────────────────────────────────────────────────────────
</script>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

const BUDGETS = [
  { id: "ultra", label: "Under $20" },
  { id: "low",   label: "Under $50" },
  { id: "mid",   label: "Under $100" },
  { id: "any",   label: "Any price" },
];

const STYLES = [
  "Exact dupe", "Similar vibe", "Secondhand only", "Sustainable brands",
];

const LOAD_MSGS = [
  "Analyzing your outfit...",
  "Identifying each piece...",
  "Hunting for dupes...",
  "Checking prices...",
  "Building your budget look...",
];

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s,e+1)); } catch(_) {} }
  return null;
}

function UploadScreen({ onSubmit }) {
  const [image, setImage] = useState(null);
  const [imageData, setImageData] = useState(null);
  const [imageType, setImageType] = useState("image/jpeg");
  const [budget, setBudget] = useState("low");
  const [style, setStyle] = useState("Similar vibe");
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef(null);

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    setImageType(file.type);
    const reader = new FileReader();
    reader.onload = (e) => {
      const result = e.target.result;
      setImage(result);
      // Extract base64 (strip data URL prefix)
      setImageData(result.split(",")[1]);
    };
    reader.readAsDataURL(file);
  }

  function handleDrop(e) {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  function submit() {
    if (!imageData) return;
    onSubmit({ imageBase64: imageData, imageType, budget, style });
  }

  return (
    <div className="upload-wrap">
      <div className="upload-hero">
        <div className="upload-title">Recreate any outfit on a budget.</div>
        <div className="upload-hint">Upload a photo of an outfit — from Instagram, Pinterest, a screenshot, anything. We'll identify each piece and find the best affordable alternatives.</div>
      </div>

      {!image ? (
        <div
          className={"dropzone" + (dragging ? " dragover" : "")}
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={handleDrop}
          onClick={() => fileRef.current && fileRef.current.click()}
        >
          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            style={{display:"none"}}
            onChange={e => e.target.files[0] && handleFile(e.target.files[0])}
          />
          <div className="dropzone-icon">📸</div>
          <div className="dropzone-text">Tap to upload outfit photo</div>
          <div className="dropzone-sub">Or drag and drop · JPG, PNG, WEBP</div>
        </div>
      ) : (
        <div className="preview-wrap">
          <img className="preview-img" src={image} alt="outfit" />
          <button className="preview-clear" onClick={() => { setImage(null); setImageData(null); }}>×</button>
        </div>
      )}

      <div className="section-label">Budget per piece</div>
      <div className="budget-row">
        {BUDGETS.map(b => (
          <button key={b.id} className={"budget-chip"+(budget===b.id?" on":"")} onClick={() => setBudget(b.id)}>{b.label}</button>
        ))}
      </div>

      <div className="section-label">What kind of alternatives?</div>
      <div className="style-row">
        {STYLES.map(s => (
          <button key={s} className={"budget-chip"+(style===s?" on":"")} onClick={() => setStyle(s)}>{s}</button>
        ))}
      </div>

      <button className="btn-go" onClick={submit} disabled={!imageData}>
        {imageData ? "Find budget alternatives →" : "Upload a photo to start"}
      </button>
    </div>
  );
}

function LoadScreen({ msg }) {
  return (
    <div className="load-wrap">
      <div className="load-ring" />
      <div className="load-msg">{msg}</div>
      <div className="load-sub">Usually 20–35 seconds</div>
    </div>
  );
}

function PieceCard({ piece }) {
  const alts = Array.isArray(piece.alternatives) ? piece.alternatives : [];
  return (
    <div className="piece-card">
      <div className="piece-top">
        <div className="piece-name">{piece.piece}</div>
        {piece.originalPriceEstimate && piece.originalPriceEstimate !== "null" && (
          <div className="piece-original">orig. {piece.originalPriceEstimate}</div>
        )}
      </div>
      {piece.description && <div className="piece-desc">{piece.description}</div>}

      {alts.map((alt, i) => (
        <a key={i} className="alt-item" href={alt.url} target="_blank" rel="noopener noreferrer">
          <div className="alt-store">{alt.store || "Shop"}</div>
          <div className="alt-details">
            <div className="alt-name">{alt.name}</div>
            {alt.why && <div className="alt-why">{alt.why}</div>}
          </div>
          <div className="alt-price">{alt.priceGuess || "View"}</div>
        </a>
      ))}

      {piece.secondhandTip && piece.secondhandTip !== "null" && (
        <div className="secondhand-tip">{piece.secondhandTip}</div>
      )}
    </div>
  );
}

function ResultsScreen({ results, pieceCount, onReset }) {
  return (
    <div className="results-wrap">
      <div className="results-header">
        <div className="results-title">Your budget look</div>
        <div className="results-sub">{pieceCount} piece{pieceCount !== 1 ? "s" : ""} identified</div>
      </div>

      <div className="total-savings">
        ✓ Budget alternatives found — tap any item to shop
      </div>

      {results.map((piece, i) => <PieceCard key={i} piece={piece} />)}

      <button className="reset-btn" onClick={onReset}>← Try another outfit</button>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("upload");
  const [loadMsg, setLoadMsg] = useState(LOAD_MSGS[0]);
  const [results, setResults] = useState(null);
  const [pieceCount, setPieceCount] = useState(0);
  const [error, setError] = useState("");
  const timerRef = useRef(null);

  async function handleSubmit({ imageBase64, imageType, budget, style }) {
    setError("");
    setScreen("loading");
    setLoadMsg(LOAD_MSGS[0]);

    let idx = 0;
    timerRef.current = setInterval(() => {
      idx = Math.min(idx + 1, LOAD_MSGS.length - 1);
      setLoadMsg(LOAD_MSGS[idx]);
    }, 5000);

    try {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64, imageType, budget, style })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const parsed = extractJSON(data.jsonText || "");
      if (!parsed || !Array.isArray(parsed) || parsed.length === 0) {
        throw new Error("Could not find alternatives. Try a clearer photo or a different outfit.");
      }

      setResults(parsed);
      setPieceCount(data.pieceCount || parsed.length);
      setScreen("results");
    } catch(e) {
      setError(e.message);
      setScreen("error");
    } finally {
      clearInterval(timerRef.current);
    }
  }

  function reset() { setScreen("upload"); setResults(null); setError(""); }

  return (
    <div className="shell">
      <div className="top-bar">
        <div style={{display:"flex",alignItems:"center"}}>
          <div className="wordmark">Dupe<span>Fit</span></div>
          <span className="beta">Beta</span>
        </div>
        <div style={{fontSize:12,color:"var(--ink3)"}}>Budget fashion AI</div>
      </div>

      {screen === "upload" && <UploadScreen onSubmit={handleSubmit} />}
      {screen === "loading" && <LoadScreen msg={loadMsg} />}
      {screen === "results" && <ResultsScreen results={results} pieceCount={pieceCount} onReset={reset} />}
      {screen === "error" && (
        <div style={{flex:1}}>
          <div className="err-box">{error}</div>
          <button className="reset-btn" style={{marginTop:16}} onClick={reset}>← Try again</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
