<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Edge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --surface:#0f0f0f;
  --surface2:#161616;
  --border:#1e1e1e;
  --border2:#2a2a2a;
  --text:#e8e8e8;
  --text2:#666;
  --text3:#3a3a3a;
  --accent:#e8ff47;
  --accent2:#c8e000;
  --red:#ff4444;
  --green:#00d084;
  --blue:#4d9fff;
  --orange:#ff8c42;
}
html,body{background:var(--bg);min-height:100vh;}
body{font-family:'Syne',sans-serif;color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.shell{max-width:680px;margin:0 auto;padding:0 24px 80px;}

/* Header */
.header{padding:32px 0 28px;border-bottom:1px solid var(--border);margin-bottom:40px;}
.logo-row{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;}
.logo{font-size:28px;font-weight:800;letter-spacing:-0.04em;color:var(--text);}
.logo span{color:var(--accent);}
.logo-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;}
.header-sub{font-size:13px;color:var(--text2);line-height:1.7;max-width:480px;}
.header-sub strong{color:var(--text);font-weight:500;}

/* Input area */
.input-section{margin-bottom:32px;}
.input-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:block;}
.topic-input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);font-family:'Syne',sans-serif;font-size:17px;font-weight:500;
  padding:14px 16px;outline:none;transition:border-color 0.2s;
  letter-spacing:-0.01em;
}
.topic-input::placeholder{color:var(--text3);}
.topic-input:focus{border-color:var(--accent);}

/* Angle selector */
.angles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin:16px 0 24px;}
.angle-btn{
  padding:10px 14px;background:var(--surface);border:1px solid var(--border2);
  color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.15s;text-align:left;letter-spacing:0.01em;
}
.angle-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.angle-btn.on{border-color:var(--accent);color:var(--accent);background:#0f1200;}
.angle-icon{display:block;font-size:16px;margin-bottom:4px;}
.angle-name{display:block;font-size:12px;font-weight:600;}
.angle-desc{display:block;font-size:11px;color:var(--text2);margin-top:2px;font-weight:400;}
.angle-btn.on .angle-desc{color:#8a9600;}

/* CTA */
.cta-row{display:flex;gap:10px;align-items:center;}
.btn-run{
  padding:13px 28px;background:var(--accent);color:#000;border:none;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.15s;letter-spacing:0.04em;text-transform:uppercase;
}
.btn-run:hover{background:var(--accent2);}
.btn-run:disabled{opacity:0.3;cursor:not-allowed;background:var(--text2);}
.btn-clear{
  padding:13px 18px;background:transparent;color:var(--text2);
  border:1px solid var(--border2);font-family:'Syne',sans-serif;
  font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;
}
.btn-clear:hover{border-color:var(--border2);color:var(--text);}

/* Quick topics */
.quick-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.quick-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px;}
.quick-btn{
  padding:6px 14px;background:transparent;border:1px solid var(--border);
  color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all 0.15s;letter-spacing:0.03em;
}
.quick-btn:hover{border-color:var(--border2);color:var(--text);}

/* Loading */
.load-wrap{padding:60px 0;text-align:center;}
.load-ring{width:32px;height:32px;border:1px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);letter-spacing:0.04em;}
.load-ticker{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-top:8px;letter-spacing:0.03em;}

/* Results */
.results-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.results-title{font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);}
.results-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.results-topic{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:24px;color:var(--text);}
.results-topic span{color:var(--accent);}

/* Signal card */
.signal-card{
  background:var(--surface);border:1px solid var(--border);
  padding:22px 22px 18px;margin-bottom:10px;
  position:relative;overflow:hidden;
  transition:border-color 0.2s;
}
.signal-card:hover{border-color:var(--border2);}
.signal-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.signal-card.money::before{background:var(--green);}
.signal-card.jobs::before{background:var(--blue);}
.signal-card.markets::before{background:var(--accent);}
.signal-card.politics::before{background:var(--red);}
.signal-card.tech::before{background:var(--orange);}
.signal-card.health::before{background:#c084fc;}
.signal-card.supply-chain::before,.signal-card["supply chain"]::before{background:var(--orange);}

.signal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.signal-headline{font-size:16px;font-weight:700;letter-spacing:-0.01em;line-height:1.3;flex:1;}
.signal-badges{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.cat-badge{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:2px;
}
.cat-badge.money{background:#001a0f;color:var(--green);border:1px solid #003020;}
.cat-badge.jobs{background:#001020;color:var(--blue);border:1px solid #002040;}
.cat-badge.markets{background:#0f1200;color:var(--accent);border:1px solid #1e2400;}
.cat-badge.politics{background:#1a0000;color:var(--red);border:1px solid #330000;}
.cat-badge.tech{background:#1a0800;color:var(--orange);border:1px solid #331000;}
.cat-badge.health{background:#130020;color:#c084fc;border:1px solid #280040;}
.urgency-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;align-self:center;}
.urgency-dot.high{background:var(--red);}
.urgency-dot.medium{background:var(--accent);}
.urgency-dot.low{background:var(--text3);}

.signal-body{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:12px;}

.vs-narrative{
  font-size:12px;font-style:italic;color:var(--text2);
  padding:9px 12px;background:var(--surface2);
  border-left:2px solid var(--border2);margin-bottom:12px;line-height:1.6;
}

.why-matters{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.why-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}

.signal-footer{display:flex;align-items:center;justify-content:space-between;}
.source-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);text-decoration:none;letter-spacing:0.03em;border-bottom:1px solid var(--border2);padding-bottom:1px;transition:all 0.15s;}
.source-link:hover{color:var(--text);border-color:var(--text2);}

/* Disclaimer */
.disclaimer{margin-top:28px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);line-height:1.7;letter-spacing:0.02em;}

.err-box{background:#1a0000;border:1px solid #330000;padding:16px;font-size:13px;color:#ff8888;line-height:1.7;margin-top:16px;}

@media(max-width:500px){.angles{grid-template-columns:1fr 1fr;}.logo{font-size:24px;}}
</style>
</head>
<body>
<div class="shell">
  <div id="root"></div>
</div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
</script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const ANGLES = [
  { id:"follow the money",      icon:"💸", name:"Follow the money",      desc:"Donations, lobbying, insider trades" },
  { id:"jobs tell the truth",   icon:"📊", name:"Jobs tell the truth",    desc:"Hiring & layoff signals" },
  { id:"what smart money sees", icon:"🛰", name:"What smart money sees",  desc:"Shipping, foot traffic, freight" },
  { id:"before the news",       icon:"🔬", name:"Before the news",        desc:"Patents, FDA, gov contracts" },
  { id:"what they're not saying",icon:"👁", name:"What they're not saying",desc:"Earnings tone, short interest" },
];

const QUICK_TOPICS = [
  "AI industry", "US housing market", "China economy", "Tech layoffs",
  "Healthcare costs", "Electric vehicles", "Commercial real estate",
  "US consumer spending", "Defense spending", "College enrollment",
];

const LOAD_MSGS = [
  "Scanning non-obvious data sources...",
  "Cross-referencing public filings...",
  "Finding what most people miss...",
  "Synthesizing the signal...",
  "Almost there...",
];

const CATEGORY_COLORS = {
  money:"money", jobs:"jobs", markets:"markets",
  politics:"politics", tech:"tech", health:"health",
  "supply chain":"supply-chain",
};

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s,e+1)); } catch(_) {} }
  return null;
}

function SignalCard({ signal }) {
  const cat = (signal.category || "markets").toLowerCase().replace(" ","_");
  const catClass = CATEGORY_COLORS[signal.category?.toLowerCase()] || "markets";
  return (
    <div className={"signal-card " + catClass}>
      <div className="signal-top">
        <div className="signal-headline">{signal.headline}</div>
        <div className="signal-badges">
          <span className={"cat-badge " + catClass}>{signal.category || "signal"}</span>
          <div className={"urgency-dot " + (signal.urgency || "medium")} title={"Urgency: " + signal.urgency} />
        </div>
      </div>

      <div className="signal-body">{signal.signal}</div>

      {signal.vsNarrative && (
        <div className="vs-narrative">{signal.vsNarrative}</div>
      )}

      <div className="why-label">Why it matters</div>
      <div className="why-matters">{signal.whyItMatters}</div>

      <div className="signal-footer">
        {signal.sourceUrl && signal.sourceUrl !== "null" ? (
          <a className="source-link" href={signal.sourceUrl} target="_blank" rel="noopener noreferrer">
            ↗ {signal.sourceLabel || "Source"}
          </a>
        ) : signal.sourceLabel ? (
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text3)",letterSpacing:"0.03em"}}>{signal.sourceLabel}</span>
        ) : <span/>}
      </div>
    </div>
  );
}

function App() {
  const [topic, setTopic] = useState("");
  const [angle, setAngle] = useState("follow the money");
  const [loading, setLoading] = useState(false);
  const [loadMsg, setLoadMsg] = useState(LOAD_MSGS[0]);
  const [results, setResults] = useState(null);
  const [resultMeta, setResultMeta] = useState(null);
  const [error, setError] = useState("");
  const timerRef = useRef(null);

  async function run(t, a) {
    const useTopic = t || topic;
    const useAngle = a || angle;
    if (!useTopic.trim()) return;
    setError(""); setResults(null); setLoading(true); setLoadMsg(LOAD_MSGS[0]);
    let i = 0;
    timerRef.current = setInterval(() => {
      i = Math.min(i+1, LOAD_MSGS.length-1);
      setLoadMsg(LOAD_MSGS[i]);
    }, 4000);
    try {
      const res = await fetch(PROXY_URL, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ topic: useTopic, angle: useAngle })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const parsed = extractJSON(data.jsonText || "");
      if (!parsed || !Array.isArray(parsed) || parsed.length === 0)
        throw new Error("No signals found for this topic. Try a different angle or broader topic.");
      setResults(parsed);
      setResultMeta({ topic: data.topic, angle: data.angle });
    } catch(e) {
      setError(e.message);
    } finally {
      clearInterval(timerRef.current);
      setLoading(false);
    }
  }

  function reset() { setResults(null); setResultMeta(null); setError(""); }

  const currentAngle = ANGLES.find(a => a.id === angle);

  return (
    <div>
      <div className="header">
        <div className="logo-row">
          <div className="logo">The<span> Edge</span></div>
          <div className="logo-tag">public signal intelligence</div>
        </div>
        <div className="header-sub">
          What <strong>sophisticated people</strong> actually track — shipping data, lobbying filings, job posting trends, patent activity, insider trades. All public. All ignored by most people. <strong>Synthesized in seconds.</strong>
        </div>
      </div>

      {/* Input always visible */}
      <div className="input-section">
        <label className="input-label">What do you want the edge on?</label>
        <input
          className="topic-input"
          placeholder="e.g. AI industry, US housing, China economy, Tesla..."
          value={topic}
          onChange={e => setTopic(e.target.value)}
          onKeyDown={e => e.key === "Enter" && run()}
        />

        <div className="quick-label" style={{marginTop:14}}>Quick topics</div>
        <div className="quick-row">
          {QUICK_TOPICS.map(t => (
            <button key={t} className="quick-btn" onClick={() => { setTopic(t); run(t, angle); }}>{t}</button>
          ))}
        </div>

        <label className="input-label">Lens</label>
        <div className="angles">
          {ANGLES.map(a => (
            <button key={a.id} className={"angle-btn" + (angle===a.id?" on":"")} onClick={() => setAngle(a.id)}>
              <span className="angle-icon">{a.icon}</span>
              <span className="angle-name">{a.name}</span>
              <span className="angle-desc">{a.desc}</span>
            </button>
          ))}
        </div>

        <div className="cta-row">
          <button className="btn-run" onClick={() => run()} disabled={!topic.trim() || loading}>
            {loading ? "Scanning..." : "Get the edge →"}
          </button>
          {(results || error) && <button className="btn-clear" onClick={reset}>Clear</button>}
        </div>
      </div>

      {/* Loading */}
      {loading && (
        <div className="load-wrap">
          <div className="load-ring" />
          <div className="load-msg">{loadMsg}</div>
          <div className="load-ticker">Checking public filings, data feeds, and non-obvious sources</div>
        </div>
      )}

      {/* Error */}
      {error && !loading && <div className="err-box">{error}</div>}

      {/* Results */}
      {results && !loading && (
        <div>
          <div className="results-header">
            <div className="results-title">Signals</div>
            <div className="results-meta">{results.length} found · {currentAngle?.name}</div>
          </div>
          <div className="results-topic">
            {resultMeta?.topic} <span>·</span>
          </div>
          {results.map((s,i) => <SignalCard key={i} signal={s} />)}
          <div className="disclaimer">
            ⚠ These signals are synthesized from public sources and are for informational purposes only.
            Nothing here is financial or investment advice. Always verify before acting.
            Sources linked where available.
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
