<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DupeFit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f6f2;--surface:#fff;--surface2:#f2ede6;
  --border:#e4ddd4;--border2:#ccc4b8;
  --ink:#18150f;--ink2:#6b6055;--ink3:#a09488;--ink4:#c8bfb4;
  --green:#1a6644;--green-bg:#eaf5ef;--green-border:#b8dccb;
  --pink:#b5164a;--pink-bg:#fde8ef;--pink-border:#f0b8cc;
}
html{background:var(--bg);}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.shell{max-width:560px;margin:0 auto;padding:0 20px 80px;min-height:100vh;display:flex;flex-direction:column;}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:22px 0 18px;border-bottom:1px solid var(--border);margin-bottom:28px;flex-shrink:0;}
.wordmark{font-size:16px;font-weight:700;letter-spacing:-0.02em;}
.wordmark span{color:var(--ink3);}
.beta{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:2px 7px;border-radius:2px;margin-left:8px;vertical-align:2px;}

/* Upload */
.upload-wrap{flex:1;display:flex;flex-direction:column;}
.upload-title{font-size:24px;font-weight:600;letter-spacing:-0.03em;margin-bottom:8px;line-height:1.25;}
.upload-hint{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:24px;}
.dropzone{border:1.5px dashed var(--border2);border-radius:8px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface);margin-bottom:20px;}
.dropzone:hover,.dropzone.drag{border-color:var(--ink);background:var(--surface2);}
.dz-icon{font-size:28px;margin-bottom:8px;}
.dz-text{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:3px;}
.dz-sub{font-size:12px;color:var(--ink3);}
.preview-wrap{position:relative;margin-bottom:20px;}
.preview-img{width:100%;max-height:380px;object-fit:contain;border-radius:6px;border:1px solid var(--border);background:var(--surface);}
.preview-clear{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.field-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.chip-row{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.chip{padding:7px 16px;border:1.5px solid var(--border);border-radius:30px;background:transparent;color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--ink2);color:var(--ink);}
.chip.on{border-color:var(--ink);background:var(--ink);color:#fff;}

.btn-main{width:100%;padding:13px;background:var(--ink);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border-radius:4px;transition:opacity 0.15s;}
.btn-main:hover{opacity:0.85;}
.btn-main:disabled{opacity:0.3;cursor:not-allowed;}

/* Loading */
.load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0;}
.load-ring{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:18px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-size:15px;font-weight:500;margin-bottom:4px;}
.load-sub{font-size:12px;color:var(--ink3);}

/* Results */
.results-wrap{flex:1;}
.results-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-bottom:3px;}
.results-sub{font-size:12px;color:var(--ink3);margin-bottom:16px;}
.found-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:4px;font-size:13px;font-weight:600;color:var(--green);margin-bottom:24px;}

.piece-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.piece-header{padding:14px 16px 10px;}
.piece-name{font-size:15px;font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;}
.piece-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.piece-color{font-size:12px;color:var(--ink2);}
.piece-orig{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);}
.piece-desc{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.6;}

/* Alt item — image on left */
.alt-item{display:flex;align-items:stretch;border-top:1px solid var(--border);text-decoration:none;color:inherit;transition:background 0.15s;}
.alt-item:hover{background:var(--surface2);}
.alt-img-box{width:88px;min-height:88px;flex-shrink:0;background:var(--surface2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.alt-img{width:88px;height:88px;object-fit:cover;display:block;}
.alt-placeholder{font-size:24px;width:88px;height:88px;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--ink4);}
.alt-body{flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.alt-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:8px;}
.alt-store{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);}
.alt-price{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--green);white-space:nowrap;}
.alt-name{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.alt-why{font-size:11px;color:var(--ink2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.alt-arrow{font-size:14px;color:var(--ink4);padding:0 10px;display:flex;align-items:center;flex-shrink:0;}

.secondhand-tip{padding:10px 14px;background:var(--pink-bg);border-top:1px solid var(--pink-border);font-size:12px;color:var(--pink);line-height:1.6;}
.secondhand-tip::before{content:'♻  ';}

.reset-btn{margin-top:20px;width:100%;padding:11px;background:transparent;color:var(--ink2);border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:4px;transition:all 0.15s;}
.reset-btn:hover{border-color:var(--border2);color:var(--ink);}
.err-box{background:#fff0f0;border:1px solid #ffcdd2;border-radius:4px;padding:14px 16px;font-size:13px;color:#c62828;line-height:1.7;margin-top:12px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  const PROXY_URL = "https://polished-dust-8e7a.josiahkondo.workers.dev";
  // Images are proxied through the Worker to avoid CORS blocking
  const imgProxy = (url) => url ? PROXY_URL + "?image=" + encodeURIComponent(url) : null;
</script>
<script type="text/babel">
const { useState, useRef } = React;

const BUDGETS = [
  { id:"50",  label:"Under $50" },
  { id:"100", label:"Under $100" },
  { id:"200", label:"Under $200" },
  { id:"any", label:"Any price" },
];
const SEXES = [
  { id:"female", label:"Women's" },
  { id:"male",   label:"Men's" },
  { id:"any",    label:"Unisex" },
];
const LOAD_MSGS = [
  "Analyzing your outfit...",
  "Identifying each piece...",
  "Searching for specific products...",
  "Loading product images...",
  "Building your look...",
];

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch(_) {}
  const t = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(t); } catch(_) {}
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e > s) { try { return JSON.parse(t.slice(s,e+1)); } catch(_) {} }
  return null;
}

function AltImage({ imageUrl, altText }) {
  const [state, setState] = useState("loading"); // loading | loaded | error

  if (!imageUrl) return <div className="alt-placeholder">🛍</div>;

  const proxied = imgProxy(imageUrl);
  return (
    <div className="alt-img-box">
      {state === "error"
        ? <div className="alt-placeholder">🛍</div>
        : <img
            className="alt-img"
            src={proxied}
            alt={altText || "product"}
            onLoad={() => setState("loaded")}
            onError={() => setState("error")}
            style={state === "loading" ? {opacity:0} : {opacity:1,transition:"opacity 0.2s"}}
          />
      }
    </div>
  );
}

function AltItem({ alt }) {
  return (
    <a className="alt-item" href={alt.url} target="_blank" rel="noopener noreferrer">
      <AltImage imageUrl={alt.imageUrl} altText={alt.name} />
      <div className="alt-body">
        <div className="alt-top-row">
          <span className="alt-store">{alt.store}</span>
          <span className="alt-price">{alt.priceGuess || "View →"}</span>
        </div>
        <div className="alt-name">{alt.name}</div>
        {alt.why && <div className="alt-why">{alt.why}</div>}
      </div>
      <div className="alt-arrow">›</div>
    </a>
  );
}

function PieceCard({ piece }) {
  const alts = Array.isArray(piece.alternatives) ? piece.alternatives : [];
  return (
    <div className="piece-card">
      <div className="piece-header">
        <div className="piece-name">{piece.piece}</div>
        <div className="piece-meta">
          {piece.color && <span className="piece-color">{piece.color}</span>}
          {piece.originalPriceEstimate && piece.originalPriceEstimate !== "null" && (
            <span className="piece-orig">orig. {piece.originalPriceEstimate}</span>
          )}
        </div>
        {piece.description && <div className="piece-desc">{piece.description}</div>}
      </div>
      {alts.map((alt, i) => <AltItem key={i} alt={alt} />)}
      {piece.secondhandTip && piece.secondhandTip !== "null" && (
        <div className="secondhand-tip">{piece.secondhandTip}</div>
      )}
    </div>
  );
}

function UploadScreen({ onSubmit }) {
  const [image, setImage] = useState(null);
  const [imageData, setImageData] = useState(null);
  const [imageType, setImageType] = useState("image/jpeg");
  const [budget, setBudget] = useState("100");
  const [sex, setSex] = useState("female");
  const [drag, setDrag] = useState(false);
  const fileRef = useRef(null);

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    setImageType(file.type);
    const r = new FileReader();
    r.onload = e => { setImage(e.target.result); setImageData(e.target.result.split(",")[1]); };
    r.readAsDataURL(file);
  }

  return (
    <div className="upload-wrap">
      <div className="upload-title">Recreate any outfit on a budget.</div>
      <div className="upload-hint">Upload any outfit photo — Instagram, Pinterest, a screenshot. We'll identify every piece and find specific, shoppable alternatives with real product images.</div>

      {!image ? (
        <div className={"dropzone"+(drag?" drag":"")}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
          onClick={()=>fileRef.current&&fileRef.current.click()}>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])} />
          <div className="dz-icon">📸</div>
          <div className="dz-text">Tap to upload outfit photo</div>
          <div className="dz-sub">JPG · PNG · WEBP · screenshot</div>
        </div>
      ) : (
        <div className="preview-wrap">
          <img className="preview-img" src={image} alt="outfit" />
          <button className="preview-clear" onClick={()=>{setImage(null);setImageData(null);}}>×</button>
        </div>
      )}

      <div className="field-label">Shopping for</div>
      <div className="chip-row">
        {SEXES.map(s=><button key={s.id} className={"chip"+(sex===s.id?" on":"")} onClick={()=>setSex(s.id)}>{s.label}</button>)}
      </div>
      <div className="field-label">Budget per piece</div>
      <div className="chip-row">
        {BUDGETS.map(b=><button key={b.id} className={"chip"+(budget===b.id?" on":"")} onClick={()=>setBudget(b.id)}>{b.label}</button>)}
      </div>
      <button className="btn-main" onClick={()=>onSubmit({imageBase64:imageData,imageType,budget,sex})} disabled={!imageData}>
        {imageData ? "Find budget alternatives →" : "Upload a photo to start"}
      </button>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("upload");
  const [loadMsg, setLoadMsg] = useState(LOAD_MSGS[0]);
  const [results, setResults] = useState(null);
  const [pieceCount, setPieceCount] = useState(0);
  const [error, setError] = useState("");
  const timerRef = useRef(null);

  async function handleSubmit({imageBase64,imageType,budget,sex}) {
    setError(""); setScreen("loading"); setLoadMsg(LOAD_MSGS[0]);
    let i=0;
    timerRef.current = setInterval(()=>{
      i=Math.min(i+1,LOAD_MSGS.length-1); setLoadMsg(LOAD_MSGS[i]);
    }, 6000);
    try {
      const res = await fetch(PROXY_URL, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({imageBase64,imageType,budget,sex})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const parsed = extractJSON(data.jsonText||"");
      if (!parsed||!Array.isArray(parsed)||parsed.length===0) {
        const dbg = data.debug ? "\n\nDebug:\n" + data.debug : "";
        throw new Error("Could not find alternatives. Try a clearer outfit photo." + dbg);
      }
      setResults(parsed); setPieceCount(data.pieceCount||parsed.length); setScreen("results");
    } catch(e) { setError(e.message); setScreen("error"); }
    finally { clearInterval(timerRef.current); }
  }

  function reset() { setScreen("upload"); setResults(null); setError(""); }

  return (
    <div className="shell">
      <div className="top-bar">
        <div style={{display:"flex",alignItems:"center"}}>
          <div className="wordmark">Dupe<span>Fit</span><span className="beta">Beta</span></div>
        </div>
        <div style={{fontSize:11,color:"var(--ink3)",letterSpacing:"0.05em",textTransform:"uppercase"}}>AI outfit finder</div>
      </div>

      {screen==="upload" && <UploadScreen onSubmit={handleSubmit} />}

      {screen==="loading" && (
        <div className="load-wrap">
          <div className="load-ring"/>
          <div className="load-msg">{loadMsg}</div>
          <div className="load-sub">Usually 25–40 seconds</div>
        </div>
      )}

      {screen==="results" && results && (
        <div className="results-wrap">
          <div className="results-title">Your budget look</div>
          <div className="results-sub">{pieceCount} piece{pieceCount!==1?"s":""} identified</div>
          <div className="found-banner">✓ Tap any item to shop — each link goes to the specific product page</div>
          {results.map((p,i)=><PieceCard key={i} piece={p}/>)}
          <button className="reset-btn" onClick={reset}>← Try another outfit</button>
        </div>
      )}

      {screen==="error" && (
        <div style={{flex:1}}>
          <div className="err-box">{error}</div>
          <button className="reset-btn" style={{marginTop:14}} onClick={reset}>← Try again</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
